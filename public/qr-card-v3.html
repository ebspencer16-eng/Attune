<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attune Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#D5CFC8;min-height:100vh}
body{font-family:'DM Sans',Arial,sans-serif;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:36px}
.lbl{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#B0A090;text-align:center;margin-bottom:-24px}
.card{width:360px;height:504px;display:flex;flex-direction:column;flex-shrink:0;position:relative}
.card.front-card{background:#FFFEF9;border-radius:2px;box-shadow:0 16px 48px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.08);border:0.5px solid rgba(0,0,0,.08)}
.card.back-card{background:#FFFEF9;border-radius:2px;box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);border:0.5px solid rgba(0,0,0,.07)}
@media print{
  @page{size:5in 7in;margin:0}
  html,body{background:white;padding:0;gap:0;display:block}
  .lbl{display:none}
  .card{width:5in!important;height:7in!important;border-radius:0!important;box-shadow:none!important;border:none!important;page-break-after:always;page-break-inside:avoid}
}
</style>
</head>
<body>
<div id="root">Loading...</div>
<script>
// ── Package definitions ───────────────────────────────────────────────────────
const PKGS = {
  core:        { accent:'#E8673A', dark:'#C45428', light:'#FFF5F0', name:'The Attune Assessment',
    intro:'Attune is a relationship tool. Two exercises, completed independently. Your results are built from your own answers. Everything unlocks when you are both done.',
    what:'Your communication profile across 10 dimensions, your expectations alignment across 5 life areas, your couple type and couple map, and an action plan built from your results.',
    steps:[['Create your accounts','Each of you scans this card and creates a separate account.'],['Complete your exercises independently','About 25 minutes each. Your answers stay private until you are both done.'],['Results unlock for both of you','Your couple type, couple map, and full profile.']] },
  newlywed:    { accent:'#C17F47', dark:'#9A6232', light:'#FFFBF5', name:'Starting Out Collection',
    intro:'Attune is a relationship tool. Two exercises completed independently, plus a practical guide to the conversations worth having now.',
    what:'Your communication profile, expectations alignment, couple type and couple map, and a Starting Out Checklist covering the real-world logistics of merging your lives.',
    steps:[['Create your accounts','Each of you scans this card and creates a separate account.'],['Complete your exercises independently','About 25 minutes each. Your answers stay private until you are both done.'],['Results unlock for both of you','Your couple type, couple map, and full profile.']] },
  anniversary: { accent:'#1B5FE8', dark:'#1447B8', light:'#F0F3FF', name:'Relationship Reflection',
    intro:'Attune is a relationship tool. Three exercises completed independently, including a reflection on the moments that shaped your relationship.',
    what:'Your communication profile, expectations alignment, a Relationship Reflection shown side by side, your couple type and couple map.',
    steps:[['Create your accounts','Each of you scans this card and creates a separate account.'],['Complete your exercises independently','About 25 minutes each across three exercises. Answers stay private until you are both done.'],['Results unlock for both of you','Your couple type, couple map, and full reflection.']] },
  premium:     { accent:'#5B6DF8', dark:'#3D4FD8', light:'#F8F5FF', name:'Attune Premium',
    intro:'Attune is a relationship tool. Every exercise, the full couple type profile, and a 50-minute session with a licensed therapist who reviews your results before you meet.',
    what:'Your communication profile, expectations alignment, a Relationship Reflection, your couple type and couple map, and a live LMFT session. A scheduling link will be provided with your results.',
    steps:[['Create your accounts','Each of you scans this card and creates a separate account.'],['Complete your exercises independently','About 25 minutes each. Answers stay private until you are both done.'],['Results unlock – then schedule your session','Your full results appear. Use your scheduling link to book your therapist session.']] },
};

function logoSVG(col, sz) {
  return `<svg width="${sz}" height="${Math.round(sz*.74)}" viewBox="0 0 103 76" fill="none"><path d="M14,4L44,4A9,9,0,0,1,53,13L53,42A9,9,0,0,1,44,51L20,51L6,61L11,51A6,6,0,0,1,5,45L5,13A9,9,0,0,1,14,4Z" fill="${col}"/><path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="white" opacity=".9" transform="translate(13.16,11.3) scale(.72)"/><path d="M89,14L59,14A9,9,0,0,0,50,23L50,52A9,9,0,0,0,59,61L83,61L97,71L92,61A6,6,0,0,0,98,55L98,23A9,9,0,0,0,89,14Z" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round"/><path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="${col}" transform="translate(58.16,21.3) scale(.72)"/></svg>`;
}

function qrSVG(col) {
  return `<svg width="100" height="100" viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="8" fill="white" stroke="${col}" stroke-opacity=".1" stroke-width="1"/><rect x="7" y="7" width="26" height="26" rx="4" fill="${col}" fill-opacity=".12" stroke="${col}" stroke-width="2"/><rect x="13" y="13" width="14" height="14" rx="2.5" fill="${col}"/><rect x="67" y="7" width="26" height="26" rx="4" fill="${col}" fill-opacity=".12" stroke="${col}" stroke-width="2"/><rect x="73" y="13" width="14" height="14" rx="2.5" fill="${col}"/><rect x="7" y="67" width="26" height="26" rx="4" fill="${col}" fill-opacity=".12" stroke="${col}" stroke-width="2"/><rect x="13" y="73" width="14" height="14" rx="2.5" fill="${col}"/>${[[40,10],[50,10],[60,10],[40,18],[60,18],[50,28],[10,40],[18,40],[28,40],[10,50],[18,60],[28,50],[40,40],[52,40],[64,40],[76,40],[88,40],[100,40],[40,52],[64,52],[88,52],[40,64],[52,64],[76,64],[100,64],[40,76],[64,76],[88,76],[52,88],[76,88],[100,88],[52,52],[76,52],[52,76],[100,52],[100,76]].map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r="${2.3+((i*3)%2)*.4}" fill="${col}" fill-opacity="${.25+((i*7)%5)*.12}"/>`).join('')}<rect x="38" y="38" width="24" height="24" rx="4" fill="white"/><text x="50" y="55" font-family="Georgia,serif" font-size="12" font-weight="700" fill="${col}" text-anchor="middle">A</text></svg>`;
}

function coupleMapSVG(col) {
  return `<svg viewBox="0 0 180 140" style="width:100%;display:block;" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="85" height="67" rx="5" fill="${col}" fill-opacity=".18"/><rect x="93" y="2" width="85" height="67" rx="5" fill="${col}" fill-opacity=".08"/><rect x="2" y="73" width="85" height="65" rx="5" fill="${col}" fill-opacity=".08"/><rect x="93" y="73" width="85" height="65" rx="5" fill="${col}" fill-opacity=".05"/><line x1="89" y1="2" x2="89" y2="138" stroke="white" stroke-width="4"/><line x1="89" y1="2" x2="89" y2="138" stroke="${col}" stroke-opacity=".15" stroke-width="1"/><line x1="2" y1="70" x2="178" y2="70" stroke="white" stroke-width="4"/><line x1="2" y1="70" x2="178" y2="70" stroke="${col}" stroke-opacity=".15" stroke-width="1"/><text x="89" y="11" font-size="7" font-weight="700" fill="${col}" fill-opacity=".6" font-family="Arial" text-anchor="middle">ENGAGE</text><text x="89" y="138" font-size="7" font-weight="700" fill="${col}" fill-opacity=".4" font-family="Arial" text-anchor="middle">WITHDRAW</text><text x="8" y="72" font-size="7" font-weight="700" fill="${col}" fill-opacity=".5" font-family="Arial">OPEN</text><text x="172" y="72" font-size="7" font-weight="700" fill="${col}" fill-opacity=".5" font-family="Arial" text-anchor="end">GUARDED</text><line x1="44" y1="30" x2="46" y2="100" stroke="${col}" stroke-opacity=".35" stroke-width="1.2" stroke-dasharray="3.5,3"/><circle cx="44" cy="30" r="14" fill="${col}" fill-opacity=".15"/><circle cx="44" cy="30" r="9" fill="${col}"/><circle cx="44" cy="30" r="9" fill="none" stroke="white" stroke-width="1.5"/><circle cx="46" cy="100" r="14" fill="${col}" fill-opacity=".12"/><circle cx="46" cy="100" r="9" fill="${col}" fill-opacity=".55"/><circle cx="46" cy="100" r="9" fill="none" stroke="white" stroke-width="1.5"/></svg>`;
}

function render() {
  const p = new URLSearchParams(location.search);
  const pkgId   = p.get('pkg')     || 'core';
  const version = p.get('version') || 'blank';
  const orderId = p.get('orderId') || p.get('order') || 'ORD-[ORDER-ID]';
  const names   = p.get('names')   || '[Partner A] & [Partner B]';
  const note    = p.get('note')    || '';
  const giftFrom = p.get('from')  || '';

  const pkg = PKGS[pkgId] || PKGS.core;
  const col = pkg.accent;

  const noteBlock = (version === 'gift' && note) ? `
    <div style="margin:9px 16px 0;background:rgba(255,255,255,.55);border:1.5px dashed ${col}40;border-radius:10px;padding:9px 12px;flex-shrink:0;">
      <div style="font-size:8.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:${col};margin-bottom:5px;">A note${giftFrom ? ' from ' + giftFrom : ''}</div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:11px;font-style:italic;color:#3A3028;line-height:1.65;">"${note}"</div>
    </div>` : (version === 'gift' ? `
    <div style="margin:9px 16px 0;background:rgba(255,255,255,.55);border:1.5px dashed ${col}40;border-radius:10px;padding:9px 12px;flex-shrink:0;">
      <div style="font-size:8.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:${col};margin-bottom:8px;">A note from</div>
      <div style="display:flex;flex-direction:column;gap:13px;">
        <div style="height:1px;background:${col}28;"></div>
        <div style="height:1px;background:${col}28;"></div>
        <div style="height:1px;background:${col}28;"></div>
      </div>
    </div>` : '');

  const steps = pkg.steps.map(([t,d],i) => `
    <div style="display:flex;align-items:flex-start;gap:9px;padding:5.5px 0;border-bottom:1px solid #F2EFEB;">
      <span style="font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:700;color:${col};flex-shrink:0;line-height:1.15;width:13px;">${i+1}</span>
      <div><b style="display:block;font-size:10px;font-weight:700;color:#0E0B07;margin-bottom:1px;">${t}</b><span style="font-size:8.5px;color:#8C7A68;line-height:1.35;">${d}</span></div>
    </div>`).join('');

  document.getElementById('root').innerHTML = `
    <div class="lbl">Front</div>
    <div class="card front-card">
      <div style="height:3px;background:${col};flex-shrink:0;"></div>
      <div style="padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid #EDE8E0;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:8px;">${logoSVG(col,19)}<span style="font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:700;color:#0E0B07;">Attune</span></div>
        <div style="font-size:7px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:${col};">${pkg.name}</div>
      </div>
      <div style="padding:13px 20px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;">
        <div style="flex:1;">
          <div style="font-size:7px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#B0A494;margin-bottom:3px;">For</div>
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:700;color:#0E0B07;line-height:1.15;letter-spacing:-.02em;margin-bottom:10px;">${names}</div>
          <div style="height:.5px;background:#EDE8E0;margin-bottom:10px;"></div>
          <div style="font-size:10px;color:#3A3028;line-height:1.65;">${pkg.intro}</div>
        </div>
        <div style="flex-shrink:0;width:88px;">${coupleMapSVG(col)}<div style="text-align:center;font-size:6.5px;color:#B0A494;font-weight:600;letter-spacing:.08em;margin-top:3px;">YOUR COUPLE MAP</div></div>
      </div>
      <div style="margin:0 20px;background:${pkg.light};border:.5px solid ${col}20;border-radius:4px;padding:11px 13px;display:flex;align-items:center;gap:13px;flex-shrink:0;">
        <div style="flex-shrink:0;">${qrSVG(col)}</div>
        <div style="flex:1;">
          <div style="font-size:12px;font-weight:700;color:#0E0B07;margin-bottom:4px;">Scan to get started</div>
          <div style="font-size:8.5px;color:#6E5F53;line-height:1.55;margin-bottom:5px;">Each of you scans this card and creates a separate account. Complete your exercises independently. Results unlock when you are both done.</div>
          <div style="font-size:8.5px;font-weight:700;color:${col};">attune-relationships.com</div>
        </div>
      </div>
      ${noteBlock}
      <div style="margin-top:auto;padding:8px 20px 9px;border-top:.5px solid #EDE8E0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="font-size:7px;color:#C0B8B0;font-style:italic;font-family:'Playfair Display',Georgia,serif;">Because understanding takes intention.</div>
        <div style="font-size:7px;color:#C0B8B0;">hello@attune-relationships.com</div>
      </div>
    </div>

    <div class="lbl">Back</div>
    <div class="card back-card">
      <div style="height:3px;background:${col};flex-shrink:0;"></div>
      <div style="padding:14px 20px 10px;border-bottom:.5px solid #EDE8E0;flex-shrink:0;">
        <div style="font-size:7px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:${col};margin-bottom:2px;">Attune</div>
        <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:#0E0B07;">How it works</div>
      </div>
      <div style="flex:1;padding:12px 20px 10px;display:flex;flex-direction:column;overflow:hidden;">
        <div style="margin-bottom:11px;flex-shrink:0;">
          <div style="font-size:7px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#B0A494;margin-bottom:7px;">Three steps</div>
          ${steps}
        </div>
        <div style="height:.5px;background:#EDE8E0;flex-shrink:0;margin-bottom:11px;"></div>
        <div style="flex:1;overflow:hidden;">
          <div style="font-size:7px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#B0A494;margin-bottom:6px;">What you will receive</div>
          <div style="font-size:10px;color:#3A3028;line-height:1.62;">${pkg.what}</div>
        </div>
      </div>
      <div style="padding:8px 20px 9px;border-top:.5px solid #EDE8E0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="font-size:7px;color:#B8B0A8;">Order: ${orderId}</div>
        <div style="font-size:7px;color:#B8B0A8;">attune-relationships.com</div>
      </div>
    </div>
  `;
}
render();
</script>
</body>
</html>
