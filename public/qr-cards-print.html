<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Attune Relationships – Welcome Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
/* ─────────────────────────────────────────────────────────────────────
   ATTUNE WELCOME CARD — letterpress-style printed insert
   Card trim: 5×7 in portrait. Aesthetic: heavy paper, single-color
   "ink" per package, centered envelope/invitation typography, no
   gradient stripes, minimal text density.
   ───────────────────────────────────────────────────────────────────── */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#D7CDC0;
  font-family:'DM Sans',Arial,sans-serif;
  color:#1A1410;
}
body{padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:32px}

.page{display:flex;flex-direction:column;align-items:center;gap:8px}
.page-label{
  font-size:9px;font-weight:700;letter-spacing:.24em;
  text-transform:uppercase;color:#8C7A68;
}

/* ────────── CARD BASE ──────────
   5×7 in portrait. Cream paper field with subtle paper-grain texture
   and an inner highlight. */
.card{
  width:5in;
  height:7in;
  flex-shrink:0;
  position:relative;
  background:
    repeating-radial-gradient(circle at 30% 20%,
      rgba(140,110,80,.012) 0,
      rgba(140,110,80,.012) 1px,
      transparent 1px,
      transparent 3px),
    radial-gradient(ellipse 90% 70% at 50% 30%, #FBF7EE 0%, #F4EDDF 60%, #EAE0CD 100%);
  box-shadow:
    inset 0 0 0 1px rgba(120,90,60,.08),
    0 18px 48px rgba(60,30,10,.18),
    0 4px 12px rgba(60,30,10,.10);
}

/* ────────── FRONT FACE ──────────
   Letterpress invitation aesthetic with brand stripe + Attune mark.
   Single ink color per package for the engraved details. */
.front{
  height:100%;
  padding:0;
  display:flex;flex-direction:column;
  position:relative;
}

/* Brand gradient stripe — top of card, full bleed */
.front-brand-stripe{
  height:6px;flex-shrink:0;
  background:linear-gradient(90deg,
    var(--grad-start) 0%,
    var(--grad-mid) 50%,
    var(--grad-end) 100%);
}

/* Inner content area — contains border + everything else */
.front-inner{
  flex:1;
  padding:.5in .55in;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  position:relative;
}

/* Engraved inner border */
.front-inner::before{
  content:"";
  position:absolute;
  top:.18in;left:.34in;right:.34in;bottom:.34in;
  border:.5px solid currentColor;
  opacity:.18;
  pointer-events:none;
}

/* Attune mark — the official brand logo (two speech bubbles + hearts).
   Sits at top, centered, in the package ink color. */
.front-attune-mark{
  width:.85in;height:.62in;
  margin:.18in 0 .14in;
  color:currentColor;
  position:relative;z-index:1;
}
.front-attune-mark svg{width:100%;height:100%;display:block}

.front-eye{
  font-family:'DM Sans',sans-serif;
  font-size:8px;font-weight:700;
  letter-spacing:.34em;text-transform:uppercase;
  color:currentColor;opacity:.65;
  margin-bottom:.2in;
  display:flex;align-items:center;gap:10px;
}
.front-eye::before,.front-eye::after{
  content:"";display:block;width:18px;height:.5px;background:currentColor;opacity:.5;
}

.front-names{
  font-family:'Playfair Display',Georgia,serif;
  font-size:30px;font-weight:500;font-style:italic;
  line-height:1;letter-spacing:-.018em;
  color:#1A1410;
  margin-bottom:.06in;
}
.front-names.two-lines{font-size:24px;line-height:1.1}
.front-names .amp{font-style:italic;font-weight:400;color:currentColor;opacity:.7;padding:0 4px}

.front-rule{
  width:48px;height:1px;
  background:currentColor;opacity:.4;
  margin:.18in 0;
}

.front-welcome{
  font-family:'Playfair Display',Georgia,serif;
  font-size:15px;font-weight:500;font-style:italic;
  color:#1A1410;
  margin-bottom:.06in;
}

.front-what{
  font-family:'DM Sans',sans-serif;
  font-size:9.5px;font-weight:400;
  line-height:1.55;color:#3C2E22;
  max-width:3.4in;
  margin-bottom:.22in;
}
.front-what.compact{
  font-size:9px;line-height:1.5;
  margin-bottom:.16in;
}

.front-contents-eye{
  font-family:'Playfair Display',Georgia,serif;
  font-size:11px;font-weight:500;font-style:italic;
  color:currentColor;opacity:.8;
  margin-bottom:.1in;
  display:flex;align-items:center;gap:8px;justify-content:center;
}
.front-contents-eye::before,.front-contents-eye::after{
  content:"";display:block;width:14px;height:.5px;background:currentColor;opacity:.5;
}

.front-contents{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;margin-bottom:.06in;
}
.front-content-item{
  font-family:'Playfair Display',Georgia,serif;
  font-size:11px;line-height:1.35;
  color:#1A1410;font-weight:500;
  letter-spacing:-.005em;
}

/* Printed gift note */
.front-gift-note{
  margin:.04in auto .14in;max-width:3.4in;
  padding:.14in .18in;
  background:rgba(255,255,255,.55);
  border-top:.5px solid currentColor;
  border-bottom:.5px solid currentColor;
}
.front-gift-eye{
  font-family:'DM Sans',sans-serif;
  font-size:7px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:currentColor;opacity:.7;
  margin-bottom:6px;
}
.front-gift-text{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-size:11.5px;
  line-height:1.5;color:#1A1410;font-weight:400;
}

/* Handwritten lines variant */
.front-write-area{
  margin:.06in auto .12in;max-width:3.4in;width:100%;
  padding:.04in 0 .12in;
}
.front-write-eye{
  font-family:'DM Sans',sans-serif;
  font-size:7px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:currentColor;opacity:.7;
  margin-bottom:.1in;
}
.front-write-lines{
  height:.7in;
  background:repeating-linear-gradient(
    transparent,
    transparent 16px,
    rgba(0,0,0,.18) 16px,
    rgba(0,0,0,.18) 16.5px
  );
}

.front-foot{
  margin-top:auto;
  padding-top:.14in;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.front-foot-arrow{
  width:14px;height:8px;color:currentColor;opacity:.55;
}
.front-foot-text{
  font-family:'DM Sans',sans-serif;
  font-size:7.5px;font-weight:600;
  letter-spacing:.3em;text-transform:uppercase;
  color:currentColor;opacity:.7;
}

.front-orderid{
  position:absolute;
  bottom:.16in;left:.34in;right:.34in;
  font-family:'DM Mono',monospace;
  font-size:6.5px;letter-spacing:.18em;
  text-transform:uppercase;
  color:#9A8772;text-align:center;
  font-weight:500;
}

/* ────────── BACK FACE ──────────
   Gradient hero on top (brand presence), cream below with steps + QR. */
.back{
  height:100%;
  padding:0;
  display:flex;flex-direction:column;
  position:relative;
}

/* Gradient hero block — top ~2.4in. Brand-colored, full bleed. */
.back-hero{
  flex-shrink:0;
  height:2.4in;
  padding:.42in .55in .38in;
  background:linear-gradient(140deg,
    var(--grad-start) 0%,
    var(--grad-mid) 52%,
    var(--grad-end) 100%);
  color:white;
  position:relative;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  overflow:hidden;
}
/* Subtle dotted texture on the gradient — gives it tactile depth */
.back-hero::before{
  content:"";
  position:absolute;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.18) 1px,transparent 0);
  background-size:14px 14px;
  pointer-events:none;
}
/* Soft accent glow */
.back-hero::after{
  content:"";position:absolute;
  bottom:-.4in;right:-.3in;width:1.4in;height:1.4in;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);
  pointer-events:none;
}

.back-hero-mark{
  width:.85in;height:.62in;
  margin-bottom:.18in;
  position:relative;z-index:1;
}
.back-hero-mark svg{width:100%;height:100%;display:block}

.back-hero-eye{
  font-family:'DM Sans',sans-serif;
  font-size:8px;font-weight:700;
  letter-spacing:.34em;text-transform:uppercase;
  color:rgba(255,255,255,.85);
  margin-bottom:.14in;
  display:flex;align-items:center;gap:10px;
  position:relative;z-index:1;
}
.back-hero-eye::before,.back-hero-eye::after{
  content:"";display:block;width:18px;height:.5px;background:rgba(255,255,255,.6);
}

.back-hero-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:22px;font-weight:500;font-style:italic;
  line-height:1.1;letter-spacing:-.018em;
  color:white;
  max-width:3.4in;
  position:relative;z-index:1;
}
.back-hero-title em{
  font-style:italic;color:rgba(255,255,255,.78);font-weight:400;
}

/* Cream lower section — steps + QR */
.back-body{
  flex:1;
  padding:.32in .55in .3in;
  display:flex;flex-direction:column;
  position:relative;
}

.back-steps{
  display:flex;flex-direction:column;gap:.16in;
  padding:0 .04in;
  flex:1;
}

.back-step{
  display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;
}

.back-step-num{
  font-family:'Playfair Display',Georgia,serif;
  font-size:18px;font-weight:500;font-style:italic;
  line-height:1;letter-spacing:-.018em;
  color:currentColor;
  padding-top:1px;
}

.back-step-content{display:flex;flex-direction:column;gap:3px}

.back-step-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:12px;font-weight:500;
  letter-spacing:-.005em;color:#1A1410;line-height:1.25;
}

.back-step-text{
  font-family:'DM Sans',sans-serif;
  font-size:9px;line-height:1.55;
  color:#5C4A38;font-weight:400;
}

.back-qr-section{
  margin-top:.18in;
  display:flex;align-items:center;gap:.22in;
  padding-top:.16in;
  border-top:.5px solid rgba(120,90,60,.25);
}
.back-qr{
  width:1.2in;height:1.2in;
  flex-shrink:0;
  background:white;
  padding:.06in;
  border:.5px solid rgba(120,90,60,.3);
}
.back-qr img{width:100%;height:100%;display:block}
.back-qr-text{flex:1;display:flex;flex-direction:column;gap:5px}
.back-qr-eye{
  font-family:'DM Sans',sans-serif;
  font-size:7px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:currentColor;opacity:.75;
}
.back-qr-instruct{
  font-family:'Playfair Display',Georgia,serif;
  font-size:11px;font-style:italic;font-weight:500;
  line-height:1.35;color:#1A1410;
  margin-bottom:2px;
}
.back-qr-url{
  font-family:'DM Mono',monospace;
  font-size:7px;letter-spacing:.04em;
  color:#5C4A38;font-weight:500;
  word-break:break-all;line-height:1.3;
}

.back-foot{
  margin-top:.12in;padding-top:.08in;
  text-align:center;
  font-family:'DM Sans',sans-serif;
  font-size:7px;font-weight:600;
  letter-spacing:.3em;text-transform:uppercase;
  color:currentColor;opacity:.5;
}

.card,.front,.back,.front-gift-note,.back-qr,
.front-brand-stripe,.back-hero,.back-hero::before,.back-hero::after,
.front-eye::before,.front-eye::after,
.back-hero-eye::before,.back-hero-eye::after,
.front-rule,.front-attune-mark,.back-hero-mark,.front-foot-arrow{
  -webkit-print-color-adjust:exact !important;
  print-color-adjust:exact !important;
  color-adjust:exact !important;
}

@media print{
  @page{size:5in 7in;margin:0}
  html,body{
    background:white;padding:0;gap:0;display:block;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  .page{
    page-break-after:always;page-break-inside:avoid;
    display:block;height:7in;gap:0;
  }
  .page:last-child{page-break-after:auto}
  .page-label{display:none}
  .card{box-shadow:none!important;border:0!important}
}

/* Preview-grid layout (no params): show all variants in a multi-column grid */
.preview-grid{
  display:flex;flex-direction:column;gap:48px;
  align-items:center;
}
.preview-section{
  display:flex;flex-direction:column;gap:12px;align-items:center;
  width:100%;max-width:1300px;
}
.preview-section-label{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;
  color:#5C4A38;
  border-bottom:1px solid #C8B8A8;
  padding-bottom:8px;margin-bottom:4px;
  width:100%;text-align:center;
}
.preview-row{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
}
@media print{
  .preview-grid{display:block}
  .preview-section{display:block}
  .preview-section-label{display:none}
  .preview-row{display:block}
}
</style>
</head>
<body>
<div id="cards-root"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// ATTUNE WELCOME CARD RENDERER
//
// URL contract:
//   ?pkg=newlywed|anniversary|premium|core   (required for single-card mode)
//   &names=Sarah+%26+James                    (displayed as headline)
//   &note=Saw+this+and+thought...             (optional; printed gift note)
//   &mode=handwrite                           (optional; renders blank lines instead)
//   &orderId=ARW-2026-0247                    (shown in footer, encoded in QR if no token)
//   &token=xyz                                (encoded into QR URL)
//
// Without params → renders a complete preview grid.
// ═══════════════════════════════════════════════════════════════════════════

// ─────────────────────────────────────────────────────────────────────────
// Per-package definitions: ink color (for engraved letterpress details),
// gradient stops (for the brand stripe + back hero), package name, what's
// inside the box.
// All packages share the Attune mark — package identity comes from ink + gradient.
// ─────────────────────────────────────────────────────────────────────────
const PACKAGES = {
  newlywed: {
    label: 'Starting Out Collection',
    eyebrow: 'A gift for two',
    ink: '#9C3D1A',                                 // burnt sienna
    grad: ['#C8522E', '#6B3FA0', '#1B5FE8'],        // coral → purple → indigo
    what: "Attune is a guided experience that helps couples understand how they communicate, where they align, and where they differ.",
    contents: [
      'The Attune Assessment',
      'Starting Out Checklist',
      'Build a Budget exercise',
    ],
  },
  anniversary: {
    label: 'Relationship Reflection',
    eyebrow: 'A gift for two',
    ink: '#1E3A6E',                                 // deep indigo
    grad: ['#C8522E', '#9B5DE5', '#1B5FE8'],        // coral → lavender → indigo
    what: "Attune is a guided experience that helps couples understand how they communicate, where they align, and where they differ.",
    contents: [
      'The Attune Assessment',
      'Relationship Reflection exercise',
      'Anniversary-specific prompts',
    ],
  },
  premium: {
    label: 'Attune Premium',
    eyebrow: 'A gift for two',
    ink: '#5A2E5C',                                 // deep plum
    grad: ['#5B6DF8', '#6B3FA0', '#1B5FE8'],        // blue → purple → indigo
    what: "Attune is a guided experience that helps couples understand how they communicate, where they align, and where they differ.",
    contents: [
      'The Attune Assessment',
      'Both bonus exercises',
      'Personalized workbook',
      'Session with a licensed therapist',
    ],
  },
  // Digital-only fallback
  core: {
    label: 'The Attune Assessment',
    eyebrow: 'A gift for two',
    ink: '#9C3D1A',
    grad: ['#C8522E', '#6B3FA0', '#1B5FE8'],
    what: "Attune is a guided experience that helps couples understand how they communicate, where they align, and where they differ.",
    contents: [
      'Communication exercise',
      'Expectations exercise',
      'Full joint results',
    ],
  },
};

// ─────────────────────────────────────────────────────────────────────────
// Attune mark — the official brand logo (two speech bubbles with hearts).
// Two color modes:
//   ink: solid currentColor on cream — for the front of the card
//   white: white outlines on the gradient hero — for the back of the card
// ─────────────────────────────────────────────────────────────────────────
function attuneMark(mode = 'ink'){
  if (mode === 'white') {
    // White-on-gradient version: both bubbles outlined in white,
    // hearts filled in white. Reads as a clean monogram on dark gradient.
    return `<svg viewBox="0 0 103 76" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <path d="M14,4L44,4A9,9,0,0,1,53,13L53,42A9,9,0,0,1,44,51L20,51L6,61L11,51A6,6,0,0,1,5,45L5,13A9,9,0,0,1,14,4Z" fill="white" fill-opacity=".18" stroke="white" stroke-width="1.5"/>
      <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="white" transform="translate(13.16,11.3) scale(.72)"/>
      <path d="M89,14L59,14A9,9,0,0,0,50,23L50,52A9,9,0,0,0,59,61L83,61L97,71L92,61A6,6,0,0,0,98,55L98,23A9,9,0,0,0,89,14Z" fill="white"/>
      <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="#1B5FE8" transform="translate(58.16,21.3) scale(.72)"/>
    </svg>`;
  }
  // Ink version (front of card): one bubble filled with ink color, the
  // other outlined. Heart ornaments inverted between the two for the
  // signature Attune mark.
  return `<svg viewBox="0 0 103 76" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <path d="M14,4L44,4A9,9,0,0,1,53,13L53,42A9,9,0,0,1,44,51L20,51L6,61L11,51A6,6,0,0,1,5,45L5,13A9,9,0,0,1,14,4Z" fill="currentColor"/>
    <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="#FBF7EE" transform="translate(13.16,11.3) scale(.72)"/>
    <path d="M89,14L59,14A9,9,0,0,0,50,23L50,52A9,9,0,0,0,59,61L83,61L97,71L92,61A6,6,0,0,0,98,55L98,23A9,9,0,0,0,89,14Z" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="currentColor" transform="translate(58.16,21.3) scale(.72)"/>
  </svg>`;
}

const DEFAULT_QR = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxIDEiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiNFRUUiLz48L3N2Zz4=';

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function splitNames(namesStr){
  if (!namesStr) return { html: 'Welcome', twoLines: false };
  const raw = namesStr.trim().replace(/\s+and\s+/i,' & ').replace(/\s*\+\s*/,' & ');
  const parts = raw.split(/\s*&\s*/);
  if (parts.length >= 2 && parts[0] && parts[1]) {
    const [a, b] = parts;
    const combined = `${a} & ${b}`;
    if (combined.length > 18) {
      return { html: `${esc(a)}<br><span class="amp">&amp;</span> ${esc(b)}`, twoLines: true };
    }
    return { html: `${esc(a)} <span class="amp">&amp;</span> ${esc(b)}`, twoLines: false };
  }
  return { html: esc(raw), twoLines: false };
}

function frontHtml(pkgKey, opts = {}){
  const pkg = PACKAGES[pkgKey] || PACKAGES.newlywed;
  const { names = '', note = '', orderId = '', mode } = opts;
  const nm = splitNames(names);

  const showHandwrite = mode === 'handwrite';
  const showPrintedNote = !showHandwrite && note && note.length > 0;

  // Gradient CSS variables piped to .front-brand-stripe
  const gradVars = `--grad-start:${pkg.grad[0]};--grad-mid:${pkg.grad[1]};--grad-end:${pkg.grad[2]};color:${pkg.ink}`;

  const printedNoteBlock = showPrintedNote ? `
    <div class="front-gift-note">
      <div class="front-gift-eye">A note for you</div>
      <div class="front-gift-text">${esc(note)}</div>
    </div>
  ` : '';

  const handwriteBlock = showHandwrite ? `
    <div class="front-write-area">
      <div class="front-write-eye">A note for you</div>
      <div class="front-write-lines"></div>
    </div>
  ` : '';

  const contentsBlock = !showHandwrite ? `
    <div class="front-contents-eye">Your gift includes</div>
    <div class="front-contents">
      ${pkg.contents.map(c => `<div class="front-content-item">${esc(c)}</div>`).join('')}
    </div>
  ` : '';

  // Identity anchor — full on standard, compact on note variants
  let identityBlock = '';
  if (!showHandwrite) {
    if (showPrintedNote) {
      identityBlock = `<div class="front-welcome">Welcome to Attune.</div>`;
    } else {
      identityBlock = `
        <div class="front-welcome">Welcome to Attune.</div>
        <p class="front-what">${esc(pkg.what)}</p>
      `;
    }
  }

  return `
<div class="page">
  <div class="card" style="${gradVars}">
    <div class="front">
      <div class="front-brand-stripe"></div>
      <div class="front-inner">
        <div class="front-attune-mark">${attuneMark('ink')}</div>
        <div class="front-eye">${esc(pkg.eyebrow)}</div>
        <h1 class="front-names ${nm.twoLines ? 'two-lines' : ''}">${nm.html}</h1>
        <div class="front-rule"></div>
        ${identityBlock}
        ${printedNoteBlock}
        ${handwriteBlock}
        ${contentsBlock}
        <div class="front-foot">
          <svg class="front-foot-arrow" viewBox="0 0 14 8" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 4h12m0 0L9.5 1m3.5 3l-3.5 3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
          </svg>
          <div class="front-foot-text">Begin on the back</div>
        </div>
        ${orderId ? `<div class="front-orderid">${esc(pkg.label)} · ${esc(orderId)}</div>` : `<div class="front-orderid">${esc(pkg.label)}</div>`}
      </div>
    </div>
  </div>
  <div class="page-label">${esc(pkg.label)} · Front${showPrintedNote ? ' (printed gift note)' : showHandwrite ? ' (handwritten lines)' : ''}</div>
</div>`;
}

function backHtml(pkgKey, opts = {}){
  const pkg = PACKAGES[pkgKey] || PACKAGES.newlywed;
  const { token = '' } = opts;
  const qrUrl = token
    ? `attune-relationships.com/welcome?qr=${token}`
    : 'attune-relationships.com/app';

  const gradVars = `--grad-start:${pkg.grad[0]};--grad-mid:${pkg.grad[1]};--grad-end:${pkg.grad[2]};color:${pkg.ink}`;

  return `
<div class="page">
  <div class="card" style="${gradVars}">
    <div class="back">
      <div class="back-hero">
        <div class="back-hero-mark">${attuneMark('white')}</div>
        <div class="back-hero-eye">How to begin</div>
        <h2 class="back-hero-title">What you'll do <em>together.</em></h2>
      </div>
      <div class="back-body">
        <div class="back-steps">
          <div class="back-step">
            <span class="back-step-num">01</span>
            <div class="back-step-content">
              <h3 class="back-step-title">Scan the code below.</h3>
              <p class="back-step-text">It opens a private welcome page just for the two of you. Use any phone camera.</p>
            </div>
          </div>
          <div class="back-step">
            <span class="back-step-num">02</span>
            <div class="back-step-content">
              <h3 class="back-step-title">Each take the assessment — separately.</h3>
              <p class="back-step-text">About 15 minutes each. Honest answers work better than strategic ones. Your responses stay private until you both finish.</p>
            </div>
          </div>
          <div class="back-step">
            <span class="back-step-num">03</span>
            <div class="back-step-content">
              <h3 class="back-step-title">See your results together.</h3>
              <p class="back-step-text">Your couple type, communication map, and personalized guidance unlock the moment you both submit.</p>
            </div>
          </div>
        </div>
        <div class="back-qr-section">
          <div class="back-qr">
            <img src="${DEFAULT_QR}" class="qr-img" data-token="${esc(token)}" alt="Scan to start"/>
          </div>
          <div class="back-qr-text">
            <div class="back-qr-eye">Scan to begin</div>
            <div class="back-qr-instruct">Or visit the link below in your browser.</div>
            <div class="back-qr-url">${esc(qrUrl)}</div>
          </div>
        </div>
        <div class="back-foot">attune-relationships.com</div>
      </div>
    </div>
  </div>
  <div class="page-label">${esc(pkg.label)} · Back</div>
</div>`;
}

(function render(){
  const params = new URLSearchParams(location.search);
  const pkg    = params.get('pkg');
  const root   = document.getElementById('cards-root');

  if (pkg && PACKAGES[pkg]) {
    const opts = {
      names:   params.get('names')   || '',
      note:    params.get('note')    || '',
      orderId: params.get('orderId') || '',
      token:   params.get('token')   || '',
      mode:    params.get('mode')    || '',
    };
    document.title = `Attune · ${PACKAGES[pkg].label}${opts.names ? ' · ' + opts.names : ''}`;
    root.innerHTML = frontHtml(pkg, opts) + backHtml(pkg, opts);
    generateQR();
  } else {
    // Preview mode — show all packages × all variants
    const sample = {
      newlywed: {
        names: 'Maya & David',
        orderId: 'ARW-2026-0247',
        note: "I saw this and thought of you two. So happy you found each other.",
      },
      anniversary: {
        names: 'Elena & Marcus',
        orderId: 'ARW-2026-0312',
        note: "Fifteen years. Still the best partner I could ask for.",
      },
      premium: {
        names: 'Taylor & Morgan',
        orderId: 'ARW-2026-0418',
        note: "Wishing you both years of growing closer. With love.",
      },
    };

    const sections = Object.keys(sample).map(key => {
      const data = sample[key];
      const pkg = PACKAGES[key];
      return `
        <div class="preview-section">
          <div class="preview-section-label">${esc(pkg.label)}</div>
          <div class="preview-row">
            ${frontHtml(key, { names: data.names, orderId: data.orderId })}
            ${frontHtml(key, { names: data.names, orderId: data.orderId, note: data.note })}
            ${frontHtml(key, { names: data.names, orderId: data.orderId, mode: 'handwrite' })}
            ${backHtml(key, { orderId: data.orderId })}
          </div>
        </div>
      `;
    }).join('');

    root.innerHTML = `<div class="preview-grid">${sections}</div>`;
    generateQR();
  }
})();

function generateQR(){
  const imgs = document.querySelectorAll('.qr-img');
  if (!imgs.length) return;
  const tryGen = () => {
    if (typeof QRCode === 'undefined') { setTimeout(tryGen, 50); return; }
    imgs.forEach(img => {
      const token = img.dataset.token;
      const url = token
        ? `https://attune-relationships.com/welcome?qr=${encodeURIComponent(token)}`
        : 'https://attune-relationships.com/app';
      QRCode.toDataURL(url, {
        width: 320,
        margin: 1,
        errorCorrectionLevel: 'M',
        color: { dark: '#1A1410', light: '#FFFFFF' },
      }, (err, dataUrl) => {
        if (err) { console.error('[qr] generation failed:', err); return; }
        img.src = dataUrl;
      });
    });
  };
  tryGen();
}
</script>
</body>
</html>
