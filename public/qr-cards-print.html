<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Attune Relationships – Welcome Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
/* ─────────────────────────────────────────────────────────────────────
   ATTUNE WELCOME CARD — top-half gradient, bottom-half cream.
   5×7 in portrait. Three packages × note variants per order.
   ───────────────────────────────────────────────────────────────────── */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:#D7CDC0;
  font-family:'DM Sans',Arial,sans-serif;
  color:#1A1410;
}
body{padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:32px}

.page{display:flex;flex-direction:column;align-items:center;gap:8px}
.page-label{
  font-size:9px;font-weight:700;letter-spacing:.24em;
  text-transform:uppercase;color:#8C7A68;
}

/* ────────── CARD BASE ──────────
   5×7 in portrait. */
.card{
  width:5in;
  height:7in;
  flex-shrink:0;
  position:relative;
  background:#F4EDDF;
  box-shadow:
    inset 0 0 0 1px rgba(120,90,60,.08),
    0 18px 48px rgba(60,30,10,.18),
    0 4px 12px rgba(60,30,10,.10);
  overflow:hidden;
}

/* ════════════════ FRONT FACE ════════════════ */
.front{
  height:100%;
  display:flex;flex-direction:column;
  position:relative;
}

/* ── TOP HALF — solid gradient, cream "Welcome to Attune" text ── */
.front-top{
  flex:1;
  background:linear-gradient(140deg,
    var(--grad-start) 0%,
    var(--grad-mid) 52%,
    var(--grad-end) 100%);
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:.45in .55in;
}

/* Continuous border around the WHOLE card — visible cream segment in
   the top half (against gradient), gradient segment in the bottom half
   (against cream). Two stacked elements with clip-path, both at the
   same .32in inset so they form one visual rectangle. */
.front-frame-cream{
  position:absolute;
  top:.32in;left:.32in;right:.32in;bottom:.32in;
  border:1px solid #FBF7EE;
  opacity:.55;
  pointer-events:none;
  /* Show only the top half of the rectangle (top edge + upper portion of sides) */
  clip-path:inset(0 0 50% 0);
  z-index:1;
}
.front-frame-gradient{
  position:absolute;
  top:.32in;left:.32in;right:.32in;bottom:.32in;
  pointer-events:none;
  padding:1px;
  background:linear-gradient(140deg,
    var(--grad-start),
    var(--grad-mid) 50%,
    var(--grad-end)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;
  opacity:.55;
  /* Show only the bottom half of the rectangle */
  clip-path:inset(50% 0 0 0);
  z-index:1;
}

/* Brand row anchored at top of gradient — Attune mark + package label */
.front-top-brand{
  position:absolute;
  top:.46in;left:.55in;right:.55in;
  display:flex;align-items:center;justify-content:space-between;
  z-index:2;
}
.front-top-mark{
  width:.7in;height:.5in;
}
.front-top-mark svg{width:100%;height:100%;display:block}
.front-top-pkg{
  font-family:'DM Sans',sans-serif;
  font-size:8px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.85);
  text-align:right;
}

/* "Welcome to Attune" — cream text centered in the gradient */
.front-top-eye{
  font-family:'DM Sans',sans-serif;
  font-size:8.5px;font-weight:700;
  letter-spacing:.36em;text-transform:uppercase;
  color:rgba(251,247,238,.75);
  margin-bottom:.12in;
  position:relative;z-index:1;
}
.front-top-headline{
  font-family:'Playfair Display',Georgia,serif;
  font-size:34px;font-weight:500;font-style:italic;
  color:#FBF7EE;
  line-height:1;letter-spacing:-.018em;
  position:relative;z-index:1;
  text-align:center;
}

/* ── BOTTOM HALF — cream, gradient-fill name, body, contents ── */
.front-bottom{
  flex:1;
  background:#F4EDDF;
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  padding:.36in .55in;
  text-align:center;
}

/* Inner content wrapper sits above the absolute border with proper z-index */
.front-bottom-content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  flex:1;width:100%;
  padding:.04in .04in .08in;
}

/* Names — large gradient-fill text using background-clip */
.front-names{
  font-family:'Playfair Display',Georgia,serif;
  font-size:38px;font-weight:500;font-style:italic;
  line-height:1.18;letter-spacing:-.022em;
  margin-top:.04in;margin-bottom:.12in;
  padding:.04in 0;
  /* Gradient-fill via background-clip: text */
  background:linear-gradient(120deg,
    var(--grad-start) 0%,
    var(--grad-mid) 50%,
    var(--grad-end) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  position:relative;z-index:1;
}
.front-names.two-lines{font-size:30px;line-height:1.2}

/* Body description — regular ink, not gradient */
.front-body{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:400;
  line-height:1.5;color:#3C2E22;
  max-width:3.6in;
  margin-bottom:.18in;
  position:relative;z-index:1;
}

/* "Your package includes" eyebrow + pipe-separated content list */
.front-pkg-eye{
  font-family:'DM Sans',sans-serif;
  font-size:8px;font-weight:700;
  letter-spacing:.32em;text-transform:uppercase;
  color:#5C4A38;
  margin-bottom:.1in;
  position:relative;z-index:1;
}
.front-pkg-list{
  font-family:'Playfair Display',Georgia,serif;
  font-size:11.5px;font-weight:500;
  line-height:1.6;color:#1A1410;
  letter-spacing:-.005em;
  max-width:4.2in;
  position:relative;z-index:1;
  text-align:center;
}
.front-pkg-list .pkg-row{
  white-space:nowrap;
}
.front-pkg-list .sep{
  margin:0 6px;color:currentColor;opacity:.4;font-weight:400;
}

/* Gift note — printed (when present) */
.front-gift-note{
  margin-bottom:.18in;
  padding:.12in .16in;
  background:rgba(255,255,255,.6);
  border-left:2px solid;
  border-image:linear-gradient(180deg, var(--grad-start), var(--grad-end)) 1;
  text-align:left;
  width:90%;
  position:relative;z-index:1;
}
.front-gift-eye{
  font-family:'DM Sans',sans-serif;
  font-size:7.5px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:#5C4A38;opacity:.8;
  margin-bottom:5px;
}
.front-gift-text{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;font-size:11.5px;
  line-height:1.5;color:#1A1410;font-weight:400;
}

/* Order ID — pushed to bottom of content area via margin-top auto */
.front-orderid{
  margin-top:auto;
  padding-top:.16in;
  font-family:'DM Mono',monospace;
  font-size:7px;letter-spacing:.14em;
  text-transform:uppercase;
  color:#9A8772;text-align:center;
  font-weight:500;
}

/* ════════════════ BACK FACE ════════════════ */
.back{
  height:100%;
  display:flex;flex-direction:column;
  position:relative;
  background:#F4EDDF;
}

.back-top{
  flex:1;
  padding:.6in .55in .4in;
  display:flex;flex-direction:column;
  position:relative;
}

/* Tagline at top — gradient-fill text */
.back-tagline{
  font-family:'Playfair Display',Georgia,serif;
  font-size:24px;font-weight:500;font-style:italic;
  line-height:1.15;letter-spacing:-.018em;
  text-align:center;
  margin-bottom:.24in;
  background:linear-gradient(120deg,
    var(--grad-start) 0%,
    var(--grad-mid) 50%,
    var(--grad-end) 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
}

/* Gradient horizontal divider */
.back-divider{
  height:2px;
  background:linear-gradient(90deg,
    var(--grad-start) 0%,
    var(--grad-mid) 50%,
    var(--grad-end) 100%);
  margin-bottom:.34in;
  flex-shrink:0;
}

/* "How to begin" eyebrow */
.back-eye{
  font-family:'DM Sans',sans-serif;
  font-size:9px;font-weight:700;
  letter-spacing:.34em;text-transform:uppercase;
  color:#5C4A38;
  margin-bottom:.22in;
  text-align:center;
}

.back-steps{
  display:flex;flex-direction:column;
  flex:1;
  justify-content:flex-start;
  gap:.3in;
}

.back-step{
  display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;
}

.back-step-num{
  font-family:'Playfair Display',Georgia,serif;
  font-size:20px;font-weight:500;font-style:italic;
  line-height:1;letter-spacing:-.018em;
  background:linear-gradient(140deg,
    var(--grad-start),
    var(--grad-mid) 50%,
    var(--grad-end));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
  padding-top:1px;
}

.back-step-content{display:flex;flex-direction:column;gap:3px}

.back-step-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:13px;font-weight:500;
  letter-spacing:-.005em;color:#1A1410;line-height:1.25;
}

.back-step-text{
  font-family:'DM Sans',sans-serif;
  font-size:9.5px;line-height:1.55;
  color:#5C4A38;font-weight:400;
}

/* Bottom gradient banner — solid gradient, no texture, with QR + links */
.back-banner{
  flex-shrink:0;
  height:2.3in;
  padding:.32in .5in;
  background:linear-gradient(140deg,
    var(--grad-start) 0%,
    var(--grad-mid) 52%,
    var(--grad-end) 100%);
  color:white;
  display:flex;align-items:center;gap:.3in;
}

.back-qr{
  width:1.5in;height:1.5in;
  flex-shrink:0;
  background:white;
  padding:.07in;
}
.back-qr img{width:100%;height:100%;display:block}

.back-banner-text{
  flex:1;display:flex;flex-direction:column;gap:6px;
  color:white;
}
.back-banner-eye{
  font-family:'DM Sans',sans-serif;
  font-size:7.5px;font-weight:700;
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.78);
  margin-bottom:2px;
}
.back-banner-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:14px;font-style:italic;font-weight:500;
  line-height:1.25;color:white;
  margin-bottom:.1in;
}

.back-link-row{
  display:flex;align-items:center;gap:8px;
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:.04em;
  color:rgba(255,255,255,.92);
  font-weight:500;
}
.back-link-row .icon{
  width:11px;height:11px;flex-shrink:0;
  display:inline-flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.78);
}
.back-link-row .icon svg{width:100%;height:100%;display:block}

/* Force background colors when printing */
.card,.front,.back,
.front-top,.front-bottom,.front-frame-cream,.front-frame-gradient,
.front-top-mark,.front-top-headline,.front-names,
.back-tagline,.back-divider,.back-step-num,
.back-banner,.back-qr,.front-gift-note{
  -webkit-print-color-adjust:exact !important;
  print-color-adjust:exact !important;
  color-adjust:exact !important;
}

@media print{
  @page{size:5in 7in;margin:0}
  html,body{
    background:white;padding:0;gap:0;display:block;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  .page{
    page-break-after:always;page-break-inside:avoid;
    display:block;height:7in;gap:0;
  }
  .page:last-child{page-break-after:auto}
  .page-label{display:none}
  .card{box-shadow:none!important;border:0!important}
}

/* Preview-grid layout */
.preview-grid{
  display:flex;flex-direction:column;gap:48px;
  align-items:center;
}
.preview-section{
  display:flex;flex-direction:column;gap:12px;align-items:center;
  width:100%;max-width:1300px;
}
.preview-section-label{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;
  color:#5C4A38;
  border-bottom:1px solid #C8B8A8;
  padding-bottom:8px;margin-bottom:4px;
  width:100%;text-align:center;
}
.preview-row{
  display:flex;gap:24px;flex-wrap:wrap;justify-content:center;
}
@media print{
  .preview-grid{display:block}
  .preview-section{display:block}
  .preview-section-label{display:none}
  .preview-row{display:block}
}
</style>
</head>
<body>
<div id="cards-root"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// ATTUNE WELCOME CARD RENDERER
//
// URL contract:
//   ?pkg=newlywed|anniversary|premium|core   (required for single-card mode)
//   &names=Sarah+%26+James                    (displayed as headline)
//   &note=Saw+this+and+thought...             (optional; printed gift note)
//   &orderId=ARW-2026-0247                    (encoded in QR if no token)
//   &token=xyz                                (encoded into QR URL)
// ═══════════════════════════════════════════════════════════════════════════

const SITE_URL  = 'attune-relationships.com';
const INSTAGRAM = '@attunerelationships';

const PACKAGES = {
  newlywed: {
    label: 'Starting Out Collection',
    grad: ['#C8522E', '#6B3FA0', '#1B5FE8'],
    contents: [
      'Communication Styles Assessment',
      'Expectations Alignment Exercise',
      'Starting Out Checklist',
      'Build a Budget Exercise',
    ],
  },
  anniversary: {
    label: 'Relationship Reflection',
    grad: ['#C8522E', '#9B5DE5', '#1B5FE8'],
    contents: [
      'Communication Styles Assessment',
      'Expectations Alignment Exercise',
      'Relationship Reflection Exercise',
      'Anniversary Prompts',
    ],
  },
  premium: {
    label: 'Attune Premium',
    grad: ['#5B6DF8', '#6B3FA0', '#1B5FE8'],
    contents: [
      'Communication Styles Assessment',
      'Expectations Alignment Exercise',
      'Personalized Workbook',
      'Therapist Session',
    ],
  },
  core: {
    label: 'The Attune Assessment',
    grad: ['#C8522E', '#6B3FA0', '#1B5FE8'],
    contents: [
      'Communication Styles Assessment',
      'Expectations Alignment Exercise',
    ],
  },
};

// Attune mark — speech bubbles + hearts in white (used on gradient top half)
function attuneMarkWhite(){
  return `<svg viewBox="0 0 103 76" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <path d="M14,4L44,4A9,9,0,0,1,53,13L53,42A9,9,0,0,1,44,51L20,51L6,61L11,51A6,6,0,0,1,5,45L5,13A9,9,0,0,1,14,4Z" fill="white" fill-opacity=".22" stroke="white" stroke-width="1.5"/>
    <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="white" transform="translate(13.16,11.3) scale(.72)"/>
    <path d="M89,14L59,14A9,9,0,0,0,50,23L50,52A9,9,0,0,0,59,61L83,61L97,71L92,61A6,6,0,0,0,98,55L98,23A9,9,0,0,0,89,14Z" fill="white"/>
    <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="rgba(91,109,248,.85)" transform="translate(58.16,21.3) scale(.72)"/>
  </svg>`;
}

const DEFAULT_QR = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxIDEiPjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiNFRUUiLz48L3N2Zz4=';

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

// "Sarah & James" / "Sarah and James" → standardized "A and B" form
function namesToHtml(namesStr){
  if (!namesStr) return { html: 'Welcome', twoLines: false };
  const raw = namesStr.trim().replace(/\s+&\s+/i,' and ').replace(/\s*\+\s*/, ' and ');
  const parts = raw.split(/\s+and\s+/i);
  if (parts.length >= 2 && parts[0] && parts[1]) {
    const [a, b] = parts;
    const combined = `${a} and ${b}`;
    if (combined.length > 22) {
      return { html: `${esc(a)} and<br>${esc(b)}`, twoLines: true };
    }
    return { html: `${esc(a)} and ${esc(b)}`, twoLines: false };
  }
  return { html: esc(raw), twoLines: false };
}

// Front of card
function frontHtml(pkgKey, opts = {}){
  const pkg = PACKAGES[pkgKey] || PACKAGES.newlywed;
  const { names = '', note = '', orderId = '' } = opts;
  const nm = namesToHtml(names);
  const gradVars = `--grad-start:${pkg.grad[0]};--grad-mid:${pkg.grad[1]};--grad-end:${pkg.grad[2]}`;

  const giftNoteBlock = note ? `
    <div class="front-gift-note">
      <div class="front-gift-eye">A note for you</div>
      <div class="front-gift-text">${esc(note)}</div>
    </div>
  ` : '';

  // Pipe-separated contents — pre-grouped into rows of 2 items so each
  // line is "item | item" with no trailing pipe at row breaks.
  const rows = [];
  for (let i = 0; i < pkg.contents.length; i += 2) {
    const row = pkg.contents.slice(i, i + 2).map(esc).join(' <span class="sep">|</span> ');
    rows.push(`<div class="pkg-row">${row}</div>`);
  }
  const contentsList = rows.join('');

  return `
<div class="page">
  <div class="card" style="${gradVars}">
    <div class="front">
      <div class="front-top">
        <div class="front-top-brand">
          <div class="front-top-mark">${attuneMarkWhite()}</div>
          <div class="front-top-pkg">${esc(pkg.label)}</div>
        </div>
        <div class="front-top-eye">A gift for two</div>
        <div class="front-top-headline">Welcome to Attune</div>
      </div>
      <div class="front-bottom">
        <div class="front-bottom-content">
          <h1 class="front-names ${nm.twoLines ? 'two-lines' : ''}">${nm.html}</h1>
          <p class="front-body">Attune Relationships offers an engaging and meaningful way to grow closer together.</p>
          ${giftNoteBlock}
          <div class="front-pkg-eye">Your package includes:</div>
          <div class="front-pkg-list">${contentsList}</div>
          ${orderId ? `<div class="front-orderid">${esc(orderId)}</div>` : ''}
        </div>
      </div>
      <div class="front-frame-cream"></div>
      <div class="front-frame-gradient"></div>
    </div>
  </div>
  <div class="page-label">${esc(pkg.label)} · Front${note ? ' (with gift note)' : ''}</div>
</div>`;
}

// Back of card
function backHtml(pkgKey, opts = {}){
  const pkg = PACKAGES[pkgKey] || PACKAGES.newlywed;
  const { token = '' } = opts;
  const gradVars = `--grad-start:${pkg.grad[0]};--grad-mid:${pkg.grad[1]};--grad-end:${pkg.grad[2]}`;

  // Globe and Instagram icons (line, currentColor — render in white on gradient)
  const globeIcon = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
    <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" stroke="currentColor" stroke-width="1.6"/>
  </svg>`;
  const instaIcon = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
  </svg>`;

  return `
<div class="page">
  <div class="card" style="${gradVars}">
    <div class="back">
      <div class="back-top">
        <h2 class="back-tagline">Understanding takes intention.</h2>
        <div class="back-divider"></div>
        <div class="back-eye">How to begin</div>
        <div class="back-steps">
          <div class="back-step">
            <span class="back-step-num">01</span>
            <div class="back-step-content">
              <h3 class="back-step-title">Scan the code together.</h3>
              <p class="back-step-text">It opens a private welcome page just for the two of you. Use any phone camera.</p>
            </div>
          </div>
          <div class="back-step">
            <span class="back-step-num">02</span>
            <div class="back-step-content">
              <h3 class="back-step-title">Each take the assessment — separately.</h3>
              <p class="back-step-text">About 15 minutes each. Honest answers work better than strategic ones. Your responses stay private until you both finish.</p>
            </div>
          </div>
          <div class="back-step">
            <span class="back-step-num">03</span>
            <div class="back-step-content">
              <h3 class="back-step-title">See your results together.</h3>
              <p class="back-step-text">Your couple type, communication map, and personalized guidance unlock the moment you both submit.</p>
            </div>
          </div>
        </div>
      </div>
      <div class="back-banner">
        <div class="back-qr">
          <img src="${DEFAULT_QR}" class="qr-img" data-token="${esc(token)}" alt="Scan to start"/>
        </div>
        <div class="back-banner-text">
          <div class="back-banner-eye">Scan to begin</div>
          <div class="back-banner-title">Your unique sign-in portal.</div>
          <div class="back-link-row">
            <span class="icon">${globeIcon}</span>
            <span>${SITE_URL}</span>
          </div>
          <div class="back-link-row">
            <span class="icon">${instaIcon}</span>
            <span>${INSTAGRAM}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="page-label">${esc(pkg.label)} · Back</div>
</div>`;
}

// Render entry
(function render(){
  const params = new URLSearchParams(location.search);
  const pkg    = params.get('pkg');
  const root   = document.getElementById('cards-root');

  if (pkg && PACKAGES[pkg]) {
    const opts = {
      names:   params.get('names')   || '',
      note:    params.get('note')    || '',
      orderId: params.get('orderId') || '',
      token:   params.get('token')   || '',
    };
    document.title = `Attune · ${PACKAGES[pkg].label}${opts.names ? ' · ' + opts.names : ''}`;
    root.innerHTML = frontHtml(pkg, opts) + backHtml(pkg, opts);
    generateQR();
  } else {
    // Preview mode
    const sample = {
      newlywed: {
        names: 'Maya and David',
        orderId: 'ARW-2026-0247',
        note: "I saw this and thought of you two. So happy you found each other.",
      },
      anniversary: {
        names: 'Elena and Marcus',
        orderId: 'ARW-2026-0312',
        note: "Fifteen years. Still the best partner I could ask for.",
      },
      premium: {
        names: 'Taylor and Morgan',
        orderId: 'ARW-2026-0418',
        note: "Wishing you both years of growing closer. With love.",
      },
    };

    const sections = Object.keys(sample).map(key => {
      const data = sample[key];
      const pkg = PACKAGES[key];
      return `
        <div class="preview-section">
          <div class="preview-section-label">${esc(pkg.label)}</div>
          <div class="preview-row">
            ${frontHtml(key, { names: data.names, orderId: data.orderId })}
            ${frontHtml(key, { names: data.names, orderId: data.orderId, note: data.note })}
            ${backHtml(key, { orderId: data.orderId })}
          </div>
        </div>
      `;
    }).join('');

    root.innerHTML = `<div class="preview-grid">${sections}</div>`;
    generateQR();
  }
})();

function generateQR(){
  const imgs = document.querySelectorAll('.qr-img');
  if (!imgs.length) return;
  const tryGen = () => {
    if (typeof QRCode === 'undefined') { setTimeout(tryGen, 50); return; }
    imgs.forEach(img => {
      const token = img.dataset.token;
      const url = token
        ? `https://attune-relationships.com/welcome?qr=${encodeURIComponent(token)}`
        : 'https://attune-relationships.com/app';
      QRCode.toDataURL(url, {
        width: 320,
        margin: 1,
        errorCorrectionLevel: 'M',
        color: { dark: '#1A1410', light: '#FFFFFF' },
      }, (err, dataUrl) => {
        if (err) { console.error('[qr] generation failed:', err); return; }
        img.src = dataUrl;
      });
    });
  };
  tryGen();
}
</script>
</body>
</html>
