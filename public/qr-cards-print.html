<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attune Relationships – QR Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#D0C9C0;font-family:'DM Sans',Arial,sans-serif}
body{padding:24px;display:flex;flex-direction:column;align-items:center;gap:24px}

.page{display:flex;flex-direction:column;align-items:center;gap:6px}
.page-label{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#8C7A68}

/* Card base */
.card{width:7in;height:4.25in;display:flex;flex-shrink:0;position:relative;border-radius:4px}
.front{background:#FFFEF9;box-shadow:0 16px 48px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.07);border:.5px solid rgba(0,0,0,.06)}
.back{background:#FFFEF9;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.10);border:.5px solid rgba(0,0,0,.05)}

/* FRONT — gradient panel on left */
.grad-panel{width:210px;height:100%;flex-shrink:0;align-self:stretch;border-radius:4px 0 0 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:36px 22px;color:white;position:relative;overflow:hidden}
.grad-panel>*:not(.gp-bg){position:relative;z-index:1}
.gp-bg{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
.gp-pkg-label{font-family:'DM Sans',sans-serif;font-size:7.5px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:5px;text-align:center}
.gp-pkg-name{font-family:'Playfair Display',Georgia,serif;font-size:13px;font-style:italic;color:rgba(255,255,255,.95);line-height:1.3;text-align:center;max-width:160px}

/* FRONT — right body */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.right-body{flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:34px 42px 20px}
.right-footer{padding:10px 42px;border-top:1px solid #EDE8E0;display:flex;align-items:center;gap:5px;flex-shrink:0}
.footer-dot{width:3px;height:3px;border-radius:50%;background:#C8B8A8}
.footer-txt{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:#B8AC9C;font-family:'DM Sans',sans-serif}

/* Main headline — partner names (or fallback) */
.welcome-eye{font-size:7.5px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#B8AC9C;margin-bottom:10px;font-family:'DM Sans',sans-serif}
.names-h{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:34px;line-height:1.0;letter-spacing:-.025em;color:#2B2218;margin-bottom:10px}
.names-h.two-lines{font-size:30px;line-height:1.08}
.names-h .amp{font-style:italic;font-weight:400;color:#8C7A68;padding:0 4px}
.welcome-sub{font-family:'Playfair Display',Georgia,serif;font-size:13px;font-style:italic;color:#5C4A38;line-height:1.5;max-width:340px;margin-bottom:14px}

/* "Get started" as a printed note — not a webpage alert */
.get-started{display:flex;align-items:center;gap:14px;padding-top:12px;border-top:1px solid #E8DDD0;margin-top:6px}
.gs-mark{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:700;line-height:1;flex-shrink:0}
.gs-body{flex:1;font-size:10px;color:#5C4A38;font-family:'DM Sans',sans-serif;line-height:1.55}
.gs-body strong{color:#2B2218;font-weight:600}

/* Gift note (variant) */
.gift-note-wrap{margin-top:6px;padding:14px 16px 12px;background:#FAF4EB;border:1px solid #E8DDD0;border-radius:2px}
.gift-note-eye{font-family:'DM Sans',sans-serif;font-size:7px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:#C17F47;margin-bottom:6px}
.gift-note-text{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:16px;line-height:1.45;color:#3C2E22;font-weight:400}
.gift-note-from{font-family:'DM Sans',sans-serif;font-size:9px;color:#8C7A68;margin-top:8px;text-align:right;letter-spacing:.02em;font-style:italic}

/* BACK */
.back-accent{height:3px;flex-shrink:0}
.back-inner{flex:1;display:flex;overflow:hidden}
.back-left{flex:1;padding:20px 24px 16px;display:flex;flex-direction:column;border-right:1px solid #F0EBE4}
.back-right{width:180px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 16px}
.back-footer{padding:8px 24px;border-top:1px solid #EDE8E0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#FAF6F0}
.back-steps-head{font-size:7.5px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#B8AC9C;margin-bottom:12px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}
.back-steps-head::after{content:"";flex:1;height:1px;background:#E8E0D4;margin-top:1px}
.step{display:flex;gap:11px;align-items:flex-start;padding-bottom:10px;border-bottom:1px solid #F2EFEB}
.step:last-child{border-bottom:none;padding-bottom:0}
.step-num{font-family:'Playfair Display',Georgia,serif;font-size:15px;font-weight:700;flex-shrink:0;line-height:1.1;width:13px}
.step-t{font-size:9.5px;font-weight:700;color:#0E0B07;margin-bottom:2px;font-family:'DM Sans',sans-serif}
.step-d{font-size:7.5px;color:#8C7A68;line-height:1.5;font-family:'DM Sans',sans-serif}

/* Force backgrounds to render when printing */
.grad-panel,.back-accent,.back-footer,.gift-note-wrap{
  -webkit-print-color-adjust:exact !important;
  print-color-adjust:exact !important;
  color-adjust:exact !important;
}

@media print{
  @page{size:8.5in 5.5in landscape;margin:.4in .5in}
  html,body{background:white;padding:0;gap:0;display:block;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  .page{page-break-after:always;page-break-inside:avoid;display:flex;flex-direction:column;align-items:center;justify-content:center;height:4.7in;gap:4px}
  .page:last-child{page-break-after:auto}
  .page-label{display:none}
  .card{box-shadow:none!important;border:0.5px solid #DDD8D0!important}
}
</style>
</head>
<body>
<div id="cards-root"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Card renderer
//
// Without URL params → renders 4 sample cards (one per package), each with
// fallback copy for preview.
//
// With URL params → renders a single personalized card:
//   ?pkg=core|newlywed|anniversary|premium
//   &names=Sarah+%26+James     (displayed as headline)
//   &note=Happy+anniversary... (optional; front becomes gift layout)
//   &from=Mom+%26+Dad          (optional attribution for gift note)
//   &orderId=ATT-...           (optional; shown small in footer)
//   &token=xyz                 (optional; appended to QR URL)
// ─────────────────────────────────────────────────────────────────────────────

const PACKAGES = {
  core:        { label:'Assessment',   name:'The Attune Assessment',   accent:'#E8673A',
                 grad:[{s:'0%',c:'#C8522E'},{s:'52%',c:'#6B3FA0'},{s:'100%',c:'#1B5FE8'}] },
  newlywed:    { label:'Starting Out', name:'Starting Out Collection', accent:'#C45C2A',
                 grad:[{s:'0%',c:'#B84A24'},{s:'52%',c:'#6B3FA0'},{s:'100%',c:'#1B5FE8'}] },
  anniversary: { label:'Anniversary',  name:'Relationship Reflection', accent:'#6B3FA0',
                 grad:[{s:'0%',c:'#C8522E'},{s:'45%',c:'#9B5DE5'},{s:'100%',c:'#1B5FE8'}] },
  premium:     { label:'Premium',      name:'Attune Premium',          accent:'#5B6DF8',
                 grad:[{s:'0%',c:'#5B6DF8'},{s:'52%',c:'#6B3FA0'},{s:'100%',c:'#1B5FE8'}] },
};

const DEFAULT_QR = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASgAAAEoCAIAAABkZftOAAAGJklEQVR4nO3dIZLlNhRA0Uxq9hAUkP0vKiAocECDZgEJFVBFb640cw522+7//y2BV7K/fH58+wX4vn6tbwB+RsKDgPAgIDwICA8CwoOA8CAgPAgIDwLCg4DwICA8CAgPAsKDgPAg8HX3D/74/beJ+zjuz7/+Hj3/7udw6n5W112df/r72r3u7ufwo/7erHgQEB4EhAcB4UFAeBAQHgSEB4HtOd7K9Nxs5dScZ3fuND03OzUHWzl1/6fmirv/1+u/NyseBIQHAeFBQHgQEB4EhAcB4UHg2Bxv5dTcY3o/2+7xt+2v2503rlTzvVNu+72tWPEgIDwICA8CwoOA8CAgPAgIDwLjc7zXTe8Tmz5++vmfu3O/ar53GyseBIQHAeFBQHgQEB4EhAcB4UHAHO8/p/ah3fb+t9fv50dlxYOA8CAgPAgIDwLCg4DwICA8CIzP8V6Z25ya103P/Vaq99pV78dbeeX3ZsWDgPAgIDwICA8CwoOA8CAgPAgcm+NN7+Oadmoud+r8rx8/7fXfmxUPAsKDgPAgIDwICA8CwoOA8CCwPcd7Zb/TtFfe83Zq/jZ9/Mptn+cpVjwICA8CwoOA8CAgPAgIDwLCg8CXz49vW3/wyn6t6fnPbe+Ru+35lit+P/+y4kFAeBAQHgSEBwHhQUB4EBAeBI7tx3tlrjV93dvOP/3evOnz7Jr+fZ76v6x4EBAeBIQHAeFBQHgQEB4EhAeBY+/H2zU9l7vtfXcrt80/d70yr9s9fvr/suJBQHgQEB4EhAcB4UFAeBAQHgS2n6u569T8bfq6K9Pzour/feV5myuvP4fTigcB4UFAeBAQHgSEBwHhQUB4ENjej/fKXG56TnXq+Fee/1l976/sq9xlxYOA8CAgPAgIDwLCg4DwICA8CGTP1ZyeC922r2x13en9fiu797Or+hx2Vfv3rHgQEB4EhAcB4UFAeBAQHgSEB4Ht52pOP0+yOn7X9Pv9Tqnu87br3rbv0YoHAeFBQHgQEB4EhAcB4UFAeBDY3o9X7dd65fiV6fOsTO+LO3Xd20zfpxUPAsKDgPAgIDwICA8CwoOA8CCwvR/vlGp/2spt87pTpud+1XsLb9s3uHseKx4EhAcB4UFAeBAQHgSEBwHhQWD8uZqV2+7z1P1Mn2fa9H3eNm9cseJBQHgQEB4EhAcB4UFAeBAQHgSO7cerng+5e/7bnmN523l+tu+xmvda8SAgPAgIDwLCg4DwICA8CAgPAtftx5ueI1Wq50Cectt8r3Lq87fiQUB4EBAeBIQHAeFBQHgQEB4Evu7+QbWvafq6p/atrY6v3ptXfS8rr8yBV+fxXE14mPAgIDwICA8CwoOA8CAgPAiM78ernn942/636Xnd6/dZ7cOcnt+uWPEgIDwICA8CwoOA8CAgPAgIDwLb+/FOeWXutHvd3f14p9w2t6yue9v7CVeseBAQHgSEBwHhQUB4EBAeBIQHgfE53vR70qr3sFX/1/Scavo+d70+712x4kFAeBAQHgSEBwHhQUB4EBAeBMbneKfmTq/Mi6rzT3/Op667+33d9pxPz9WEhwkPAsKDgPAgIDwICA8CwoPA9vvxXnfbXGj6PKfctq9y97rT7100x4MHCA8CwoOA8CAgPAgIDwLCg8D2frzbnk+4Mv2euun9Wq/sM5z+PUy/p666rhUPAsKDgPAgIDwICA8CwoOA8CCwvR+vmqusTD/X8TbVfr/X9+NNsx8PHiA8CAgPAsKDgPAgIDwICA8C2fvxdlVzwmq+dNucbfr+b5u/Td+PFQ8CwoOA8CAgPAgIDwLCg4DwIDA+x3vFbe9nm95neGruNz1fnb7Paj+nFQ8CwoOA8CAgPAgIDwLCg4DwIGCO9528Mt+bPn5X9XzO6fNb8SAgPAgIDwLCg4DwICA8CAgPAuNzvOp5mCvT+9mm93FVc6pqv9/u+W97f+OKFQ8CwoOA8CAgPAgIDwLCg4DwIPDl8+Pb1h9U7zHbVT1H8bbnc07Pr6Z/D9PfY/V5WvEgIDwICA8CwoOA8CAgPAgIDwLbczzg/7PiQUB4EBAeBIQHAeFBQHgQEB4EhAcB4UFAeBAQHgSEBwHhQUB4EBAeBP4BtjYU9BX0AoMAAAAASUVORK5CYII=';

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

/** Parse names like "Sarah & James" / "Sarah and James" / "Sarah + James"
 *  into two-line HTML with an italic ampersand. */
function splitNames(namesStr) {
  if (!namesStr) return { html: 'Welcome', twoLines: false };
  const raw = namesStr.trim().replace(/\s+and\s+/i, ' & ').replace(/\s*\+\s*/, ' & ');
  const parts = raw.split(/\s*&\s*/);
  if (parts.length >= 2 && parts[0] && parts[1]) {
    const [a, b] = parts;
    const combined = `${a} & ${b}`;
    if (combined.length > 16) {
      return { html: `${esc(a)}<br><span class="amp">&amp;</span> ${esc(b)}`, twoLines: true };
    }
    return { html: `${esc(a)} <span class="amp">&amp;</span> ${esc(b)}`, twoLines: false };
  }
  return { html: esc(raw), twoLines: false };
}

function gradDefs(id, pkg) {
  const stops = pkg.grad.map(p => `<stop offset="${p.s}" stop-color="${p.c}"/>`).join('');
  return `<defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1">${stops}</linearGradient></defs>`;
}

function gradStripDefs(id, pkg) {
  const stops = pkg.grad.map(p => `<stop offset="${p.s}" stop-color="${p.c}"/>`).join('');
  return `<defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0">${stops}</linearGradient></defs>`;
}

/** Attune mark — coral left bubble with white heart, white right bubble
 *  with coral heart. Matches the notepad white-fill variant. */
function markSvg(w = 92, h = 68) {
  return `<svg width="${w}" height="${h}" viewBox="0 0 103 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><linearGradient id="mCoral" x1="0" y1="0" x2="103" y2="76" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#E8906F"/><stop offset="100%" stop-color="#C8522E"/></linearGradient></defs>
  <path d="M14,4L44,4A9,9,0,0,1,53,13L53,42A9,9,0,0,1,44,51L20,51L6,61L11,51A6,6,0,0,1,5,45L5,13A9,9,0,0,1,14,4Z" fill="url(#mCoral)"/>
  <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="white" transform="translate(13.16,11.3) scale(.72)"/>
  <path d="M89,14L59,14A9,9,0,0,0,50,23L50,52A9,9,0,0,0,59,61L83,61L97,71L92,61A6,6,0,0,0,98,55L98,23A9,9,0,0,0,89,14Z" fill="white"/>
  <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="url(#mCoral)" transform="translate(58.16,21.3) scale(.72)"/>
</svg>`;
}

function cardHtml(pkgKey, opts = {}) {
  const pkg = PACKAGES[pkgKey];
  if (!pkg) return '';
  const { names = '', note = '', from = '', orderId = '' } = opts;
  const nm = splitNames(names);
  const hasGiftNote = !!note;

  const giftBlock = `
    <div class="gift-note-wrap">
      <div class="gift-note-eye">A note for you</div>
      <div class="gift-note-text">${esc(note)}</div>
      ${from ? `<div class="gift-note-from">— ${esc(from)}</div>` : ''}
    </div>
  `;

  const gsBlock = `
    <div class="get-started">
      <div class="gs-mark" style="color:${pkg.accent}">→</div>
      <div class="gs-body">Scan the QR code on the back to begin, or visit <strong>attune-relationships.com/app</strong></div>
    </div>`;

  const front = `
<div class="page">
  <div class="card front">
    <div class="grad-panel">
      <svg class="gp-bg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 210 408">
        ${gradDefs('gp_' + pkgKey, pkg)}
        <rect width="210" height="408" fill="url(#gp_${pkgKey})"/>
      </svg>
      ${markSvg(92, 68)}
      <div>
        <div class="gp-pkg-label">Package</div>
        <div class="gp-pkg-name">${esc(pkg.name)}</div>
      </div>
    </div>
    <div class="right">
      <div class="right-body">
        <div class="welcome-eye">${names ? 'For' : 'Welcome'}</div>
        <div class="names-h ${nm.twoLines ? 'two-lines' : ''}">${nm.html}</div>
        <div class="welcome-sub">Welcome to your Attune relationship experience.</div>
        ${hasGiftNote ? giftBlock : gsBlock}
      </div>
      <div class="right-footer">
        <div class="footer-txt">attune-relationships.com</div>
        <div class="footer-dot"></div>
        <div class="footer-txt">${esc(pkg.name)}</div>
        ${orderId ? `<div class="footer-dot"></div><div class="footer-txt" style="font-family:monospace;letter-spacing:.06em;text-transform:none">${esc(orderId)}</div>` : ''}
      </div>
    </div>
  </div>
  <div class="page-label">${esc(pkg.label)} – Front${hasGiftNote ? ' (gift)' : ''}</div>
</div>`;

  const back = `
<div class="page">
  <div class="card back">
    <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 1008 6" style="display:block;width:100%;height:6px">
      ${gradStripDefs('gs_' + pkgKey, pkg)}
      <rect width="1008" height="6" fill="url(#gs_${pkgKey})"/>
    </svg>
    <div class="back-inner">
      <div class="back-left">
        <div class="back-steps-head">How to get started</div>
        <div style="display:flex;flex-direction:column;gap:9px;flex:1;justify-content:center">
          <div class="step"><div class="step-num" style="color:${pkg.accent}">1</div><div><div class="step-t">Scan the QR code</div><div class="step-d">Use your phone's camera. Opens directly to your Attune account setup.</div></div></div>
          <div class="step"><div class="step-num" style="color:${pkg.accent}">2</div><div><div class="step-t">Create your account</div><div class="step-d">Takes about two minutes. You'll invite your partner from inside the app.</div></div></div>
          <div class="step"><div class="step-num" style="color:${pkg.accent}">3</div><div><div class="step-t">Answer on your own</div><div class="step-d">Both partners answer independently. Your answers stay private until you both finish.</div></div></div>
          <div class="step"><div class="step-num" style="color:${pkg.accent}">4</div><div><div class="step-t">See your results together</div><div class="step-d">Couple type, map, and insights unlock when both of you are done.</div></div></div>
        </div>
      </div>
      <div class="back-right">
        <div style="font-size:7.5px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#B8AC9C;text-align:center;font-family:'DM Sans',sans-serif;margin-bottom:10px">Scan to start</div>
        <img src="${DEFAULT_QR}" width="108" height="108" style="border-radius:6px;border:1px solid #EDE8E0;display:block"/>
        <div style="text-align:center;margin-top:10px">
          <div style="font-size:8px;font-weight:700;color:#0E0B07;font-family:'DM Sans',sans-serif;margin-bottom:3px">attune-relationships.com</div>
        </div>
      </div>
    </div>
    <div class="back-footer">
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:9px;font-style:italic;color:#8C7A68">Understanding takes intention.</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:7px;color:#B8AC9C;letter-spacing:.04em">${esc(pkg.name)}</div>
    </div>
  </div>
  <div class="page-label">${esc(pkg.label)} – Back</div>
</div>`;

  return front + back;
}

(function render() {
  const params = new URLSearchParams(location.search);
  const pkg = params.get('pkg');
  const root = document.getElementById('cards-root');

  if (pkg && PACKAGES[pkg]) {
    const opts = {
      names:   params.get('names')   || '',
      note:    params.get('note')    || '',
      from:    params.get('from')    || '',
      orderId: params.get('orderId') || '',
    };
    document.title = `Attune – ${PACKAGES[pkg].label}${opts.names ? ' – ' + opts.names : ''}`;
    root.innerHTML = cardHtml(pkg, opts);
  } else {
    // Default preview: show a sample of each package, including one gift variant
    root.innerHTML = [
      cardHtml('core',        { names: 'Sarah & James' }),
      cardHtml('newlywed',    { names: 'Maya & Chris' }),
      cardHtml('anniversary', { names: 'Elena & David', note: "Fifteen years. Still the best partner I could ask for.", from: 'David' }),
      cardHtml('premium',     { names: 'Taylor & Morgan' }),
    ].join('');
  }
})();
</script>
</body>
</html>
