<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attune Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#D0C9C0;min-height:100vh}
body{font-family:'DM Sans',Arial,sans-serif;padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:32px}
.lbl{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#8C7A68;text-align:center;margin-bottom:-18px}
.card{width:672px;height:420px;display:flex;flex-shrink:0;position:relative}
.card.front{background:#FFFEF9;border-radius:3px;box-shadow:0 20px 56px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.08);border:.5px solid rgba(0,0,0,.07)}
.card.back{background:#FFFEF9;border-radius:3px;box-shadow:0 12px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);border:.5px solid rgba(0,0,0,.06)}
/* Gradient panel */
.grad-panel{width:232px;flex-shrink:0;background:linear-gradient(160deg,#C8522E 0%,#6B3FA0 52%,#1B5FE8 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:36px;border-radius:3px 0 0 3px}
/* Right panel */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.right-body{flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:44px 44px 28px}
.right-footer{padding:12px 44px;border-top:1px solid #EDE8E0;display:flex;align-items:center;gap:6px;flex-shrink:0}
.footer-dot{width:3px;height:3px;border-radius:50%;background:#C8B8A8;flex-shrink:0}
.footer-txt{font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:#C0B4A8;font-family:'DM Sans',sans-serif}
/* Back styles */
.back-accent{height:2px;background:linear-gradient(90deg,#C8522E,#6B3FA0,#1B5FE8);flex-shrink:0}
.back-inner{flex:1;display:flex;overflow:hidden}
.back-left{flex:1;padding:20px 24px;display:flex;flex-direction:column;border-right:1px solid #F0EBE4;overflow:hidden}
.back-right{width:192px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;gap:14px}
.back-footer{padding:8px 24px;border-top:1px solid #EDE8E0;display:flex;justify-content:space-between;flex-shrink:0}
.step{display:flex;gap:10px;align-items:flex-start;padding-bottom:10px;border-bottom:1px solid #F2EFEB}
.step:last-child{border-bottom:none;padding-bottom:0}
.step-num{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:700;color:#C8522E;flex-shrink:0;line-height:1.2;width:12px}
.step-t{font-size:9.5px;font-weight:700;color:#0E0B07;font-family:'DM Sans',sans-serif;margin-bottom:2px}
.step-d{font-size:8px;color:#8C7A68;line-height:1.45;font-family:'DM Sans',sans-serif}
.names{font-family:'Playfair Display',Georgia,serif;font-weight:700;line-height:1.0;letter-spacing:-.03em;background:linear-gradient(120deg,#C8522E 0%,#6B3FA0 50%,#1B5FE8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.divider-line{width:36px;height:1px;background:linear-gradient(90deg,#C8522E,#1B5FE8);opacity:.32;margin:16px 0}
.welcome{font-family:'Playfair Display',Georgia,serif;font-size:13px;font-style:italic;color:#8C7A68}
.for-label{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#C0B4A8;font-family:'DM Sans',sans-serif;margin-bottom:12px}
.note-bar{border-left:2px solid #E8673A;padding-left:14px;margin-top:4px}
.note-from{font-size:7.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#C8522E;font-family:'DM Sans',sans-serif;margin-bottom:6px}
.note-text{font-family:'Playfair Display',Georgia,serif;font-size:11.5px;font-style:italic;color:#4A3C34;line-height:1.65}
.note-lines{display:flex;flex-direction:column;gap:15px;flex:1;justify-content:center}
.note-line{height:1px;background:#E8DDD0}
@media print{
  @page{size:7in 5in;margin:0}
  html,body{background:white;padding:0;gap:0;display:block}
  .lbl{display:none}
  .card{width:7in!important;height:5in!important;border-radius:0!important;box-shadow:none!important;border:none!important;page-break-after:always;page-break-inside:avoid}
  .grad-panel{border-radius:0!important}
}
</style>
</head>
<body>
<div id="root">Loading...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const PKGS = {
  core:       {name:'The Attune Assessment'},
  newlywed:   {name:'Starting Out Collection'},
  anniversary:{name:'Relationship Reflection'},
  premium:    {name:'Attune Premium'},
};

function logoSVG(sz) {
  return `<svg width="${sz}" height="${Math.round(sz*.74)}" viewBox="0 0 103 76" fill="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="103" y2="76" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="rgba(255,255,255,.92)"/><stop offset="100%" stop-color="rgba(255,255,255,.75)"/></linearGradient></defs>
    <path d="M14,4L44,4A9,9,0,0,1,53,13L53,42A9,9,0,0,1,44,51L20,51L6,61L11,51A6,6,0,0,1,5,45L5,13A9,9,0,0,1,14,4Z" fill="url(#lg)"/>
    <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="rgba(90,40,150,.6)" transform="translate(13.16,11.3) scale(.72)"/>
    <path d="M89,14L59,14A9,9,0,0,0,50,23L50,52A9,9,0,0,0,59,61L83,61L97,71L92,61A6,6,0,0,0,98,55L98,23A9,9,0,0,0,89,14Z" fill="white" stroke="url(#lg)" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M22,11C20,8.5,16.5,5,11.5,5C5.5,5,2,9.5,2,14.5C2,23,11,30,22,40C33,30,42,23,42,14.5C42,9.5,38.5,5,32.5,5C27.5,5,24,8.5,22,11Z" fill="url(#lg)" transform="translate(58.16,21.3) scale(.72)"/>
  </svg>`;
}

function qrSVG() {
  // Returns placeholder while real QR generates
  return `<div id="qr-container" style="width:104px;height:104px;display:flex;align-items:center;justify-content:center;background:#FBF8F3;border-radius:6px;border:1px solid #E8DDD0"><span style="font-size:9px;color:#C0B4A8;font-family:DM Sans,sans-serif">Loading…</span></div>`;
}

function renderQRCode(url) {
  const container = document.getElementById('qr-container');
  if (!container || typeof QRCode === 'undefined') return;
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 104,
    height: 104,
    colorDark: '#C8522E',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M,
  });
}

function render() {
  const p = new URLSearchParams(location.search);
  const pkgId   = p.get('pkg') || 'core';
  const version = p.get('version') || 'blank';
  const orderId = p.get('orderId') || p.get('order') || 'ORD-XXXXX';
  const names   = p.get('names') || '[Recipient Names]';
  const note    = p.get('note') || '';
  const from    = p.get('from') || '';
  const pkg     = PKGS[pkgId] || PKGS.core;
  const isGift  = version === 'gift';
  const hasNote = isGift && note;
  const hasLines= isGift && !note;

  // Name sizing – scale down for long names
  const nameLen = names.length;
  const nameFontSize = nameLen > 20 ? '28px' : nameLen > 15 ? '32px' : '40px';

  // Footer text
  const footerRight = isGift
    ? `<span class="footer-txt">Welcome to Attune</span><div class="footer-dot"></div><span class="footer-txt">Flip for instructions</span>`
    : `<span class="footer-txt">Flip for instructions</span>`;

  // Note block for gift
  let noteBlock = '';
  if (hasNote) {
    noteBlock = `<div class="note-bar" style="margin-top:16px">
      <div class="note-from">${from ? 'From ' + from : 'A note'}</div>
      <div class="note-text">"${note}"</div>
    </div>`;
  } else if (hasLines) {
    noteBlock = `<div class="note-bar" style="margin-top:16px;border-left-color:#E8DDD0">
      <div class="note-lines">
        <div class="note-line"></div><div class="note-line"></div>
        <div class="note-line"></div><div class="note-line"></div>
      </div>
    </div>`;
  }

  const STEPS = [
    ['Create your accounts','Each of you scans and creates a separate account. Your answers stay private.'],
    ['Complete your exercises independently','About 25 minutes each. Two exercises – communication and expectations.'],
    ['Your results unlock together','Couple type, communication profile, and expectations map – built from your answers.'],
  ];

  document.getElementById('root').innerHTML = `
    <div class="lbl">Front</div>
    <div class="card front">
      <div class="grad-panel">
        ${logoSVG(76)}
        <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:-.01em">Attune</div>
        <div style="font-size:6.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-top:2px;font-family:'DM Sans',sans-serif;">Relationships</div>
      </div>
      <div class="right">
        <div class="right-body">
          <div class="for-label">For</div>
          <div class="names" style="font-size:${nameFontSize}">${names.replace(' & ','<br>&amp; ')}</div>
          <div class="divider-line"></div>
          <div class="welcome">Welcome to Attune Relationships.</div>
          ${noteBlock}
        </div>
        <div class="right-footer">${footerRight}</div>
      </div>
    </div>

    <div class="lbl">Back</div>
    <div class="card back" style="flex-direction:column">
      <div class="back-accent"></div>
      <div class="back-inner">
        <div class="back-left">
          <div style="font-size:7px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#C8522E;font-family:'DM Sans',sans-serif;margin-bottom:2px">Attune</div>
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-weight:700;color:#0E0B07;margin-bottom:14px">How to get started</div>
          <div style="display:flex;flex-direction:column;gap:0;flex:1">
            ${STEPS.map(([t,d],i)=>`<div class="step" style="${i>0?'padding-top:10px':''}"><span class="step-num">${i+1}</span><div><div class="step-t">${t}</div><div class="step-d">${d}</div></div></div>`).join('')}
          </div>
        </div>
        <div class="back-right">
          ${qrSVG()}
          <div style="text-align:center">
            <div style="font-size:10px;font-weight:700;color:#0E0B07;font-family:'DM Sans',sans-serif;margin-bottom:5px">Scan to begin</div>
            <div style="font-size:8px;font-weight:700;color:#C8522E;font-family:'DM Sans',sans-serif">attune-relationships.com</div>
          </div>
        </div>
      </div>
      <div class="back-footer">
        <span style="font-family:'Playfair Display',Georgia,serif;font-size:7.5px;color:#C0B8B0;font-style:italic">Understanding takes intention.</span>
        <span style="font-size:7px;color:#C0B8B0;font-family:'DM Sans',sans-serif">Order: ${orderId}</span>
      </div>
    </div>`;
}
render();

// Build the QR target URL from card params
(function() {
  const p = new URLSearchParams(location.search);
  const pkgId  = p.get('pkg') || 'core';
  const token  = p.get('token') || '';
  const isGift = p.get('version') === 'gift';
  // QR encodes the signup URL – scanner lands on /app ready to create their account
  const base = window.location.origin;
  const orderId = p.get('orderId') || p.get('order') || '';
  const qrParams = new URLSearchParams({ signup: '1', pkg: pkgId });
  if (p.get('version') === 'gift_printed' || p.get('version') === 'gift_blank' || isGift) qrParams.set('gift', '1');
  if (token) qrParams.set('invite', token);
  if (p.get('p1')) qrParams.set('p1', p.get('p1'));
  if (p.get('p2')) qrParams.set('p2', p.get('p2'));
  if (orderId) qrParams.set('order', orderId);
  const qrUrl = `${base}/app?${qrParams.toString()}`;
  // Render after a short tick to let DOM settle
  setTimeout(() => renderQRCode(qrUrl), 80);
})();
</script>
</body>
</html>
