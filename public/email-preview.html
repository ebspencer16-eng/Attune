<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Attune – Email Templates</title>
<style>
  body{margin:0;padding:0;background:#1e1a35;font-family:'Helvetica Neue',Arial,sans-serif;color:white;}
  .nav{padding:1rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid rgba(255,255,255,0.1);}
  .nav-title{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.45);}
  .tabs{display:flex;gap:0.5rem;padding:1.5rem 2rem 0;}
  .tab{padding:0.5rem 1.25rem;border-radius:8px 8px 0 0;font-size:0.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.12);border-bottom:none;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);transition:all .15s;}
  .tab.active{background:#F3EDE6;color:#0E0B07;border-color:#F3EDE6;}
  .preview-wrap{margin:0 2rem;border:1px solid rgba(255,255,255,0.12);border-radius:0 8px 8px 8px;overflow:hidden;}
  iframe{display:block;width:100%;border:none;background:#F3EDE6;}
  .meta{padding:1rem 2rem;font-size:0.72rem;color:rgba(255,255,255,0.35);}
  .meta strong{color:rgba(255,255,255,0.65);}
</style>
</head>
<body>
<div class="nav">
  <span style="font-size:1rem;font-weight:700;font-family:Georgia,serif;">Attune</span>
  <span class="nav-title">Email template preview</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="show('partner_invite',this)">Partner invite</div>
  <div class="tab" onclick="show('workbook_ready',this)">Workbook ready</div>
  <div class="tab" onclick="show('beta_survey',this)">Beta survey</div>
  <div class="tab" onclick="show('checkin_6mo',this)">6-month check-in</div>
  <div class="tab" onclick="show('welcome_account',this)">Welcome</div>
  <div class="tab" onclick="show('partner_joined',this)">Partner joined</div>
  <div class="tab" onclick="show('lmft_scheduled',this)">LMFT scheduled</div>
  <div class="tab" onclick="show('checkin_1yr',this)">1-year check-in</div>
  <div class="tab" onclick="show('order_confirm',this)">Order confirm</div>
</div>

<div class="preview-wrap">
  <iframe id="preview" height="700"></iframe>
</div>
<div class="meta" id="meta"></div>

<script>
const LOGO = `<svg width="28" height="20" viewBox="0 0 103 76" fill="none"><defs><linearGradient id="eg" x1="0" y1="0" x2="103" y2="76" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#E8673A"/><stop offset="100%" stop-color="#1B5FE8"/></linearGradient></defs><path d="M14,4 L44,4 A9,9 0 0,1 53,13 L53,42 A9,9 0 0,1 44,51 L20,51 L6,61 L11,51 A6,6 0 0,1 5,45 L5,13 A9,9 0 0,1 14,4 Z" fill="url(#eg)"/><path d="M22 11 C20 8.5 16.5 5 11.5 5 C5.5 5 2 9.5 2 14.5 C2 23 11 30 22 40 C33 30 42 23 42 14.5 C42 9.5 38.5 5 32.5 5 C27.5 5 24 8.5 22 11 Z" fill="white" opacity=".93" transform="translate(13.16,11.3) scale(.72)"/><path d="M89,14 L59,14 A9,9 0 0,0 50,23 L50,52 A9,9 0 0,0 59,61 L83,61 L97,71 L92,61 A6,6 0 0,0 98,55 L98,23 A9,9 0 0,0 89,14 Z" fill="none" stroke="url(#eg)" stroke-width="2.2" stroke-linejoin="round"/><path d="M22 11 C20 8.5 16.5 5 11.5 5 C5.5 5 2 9.5 2 14.5 C2 23 11 30 22 40 C33 30 42 23 42 14.5 C42 9.5 38.5 5 32.5 5 C27.5 5 24 8.5 22 11 Z" fill="url(#eg)" transform="translate(58.16,21.3) scale(.72)"/></svg>`;

const SHARED_CSS = `<style>
  body{margin:0;padding:0;background:#F3EDE6;font-family:'Helvetica Neue',Arial,sans-serif;}
  .wrap{max-width:560px;margin:0 auto;padding:32px 16px;}
  .card{background:#FFFDF9;border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(14,11,7,.08);}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:32px;}
  .logo-text{font-size:1.1rem;font-weight:700;color:#0E0B07;}
  .grad-bar{height:3px;background:linear-gradient(90deg,#E8673A,#1B5FE8);border-radius:2px;margin-bottom:28px;}
  h1{font-size:1.5rem;font-weight:700;color:#0E0B07;margin:0 0 12px;line-height:1.2;}
  p{font-size:.9rem;color:#5C4D3C;line-height:1.75;margin:0 0 16px;}
  .btn{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#E8673A,#1B5FE8);color:white!important;text-decoration:none;border-radius:12px;font-weight:700;font-size:.88rem;letter-spacing:.03em;}
  .btn-wrap{text-align:center;margin:28px 0;}
  .divider{height:1px;background:#E8DDD0;margin:24px 0;}
  .footer{text-align:center;font-size:.7rem;color:#C17F47;margin-top:24px;line-height:1.8;}
  .detail-row{display:flex;justify-content:space-between;font-size:.82rem;padding:8px 0;border-bottom:1px solid #F3EDE6;color:#5C4D3C;}
  .detail-row strong{color:#0E0B07;}
  .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
  .badge-orange{background:#FFF0EB;color:#E8673A;}
  .badge-green{background:#ECFDF5;color:#059669;}
</style>`;

function wrap(body, subject) {
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>${SHARED_CSS}</head><body>
  <div class="wrap"><div class="card">
  <div class="logo">${LOGO}<span class="logo-text">Attune</span></div>
  <div class="grad-bar"></div>
  ${body}
  </div>
  <div class="footer">Attune · attune-relationships.com<br/><a href="#" style="color:#C17F47">Unsubscribe</a></div>
  </div></body></html>`;
}

const templates = {
  partner_invite: {
    subject: "Maya invited you to take Attune",
    preview: "To: alex@example.com",
    html: wrap(`
      <h1>Maya invited you to take Attune together.</h1>
      <p>Hi Alex,</p>
      <p>Maya completed their Attune exercises and wants to see your results together. Attune maps how you each communicate, what you expect from each other, and where you're already aligned.</p>
      <p>Your answers are private until both of you are done. Results unlock the moment you finish.</p>
      <div class="btn-wrap"><a href="#" class="btn">Start my exercises →</a></div>
      <div class="divider"></div>
      <p style="font-size:.78rem;color:#8C7A68;">Takes about 15 minutes. No right answers – just yours.</p>
    `)
  },
  workbook_ready: {
    subject: "Your Attune workbook is ready",
    preview: "To: maya@example.com",
    html: wrap(`
      <span class="badge badge-green">Workbook ready</span>
      <h1 style="margin-top:14px;">Your personalized workbook is ready.</h1>
      <p>Hi Maya,</p>
      <p>Your workbook for Maya &amp; Alex has been generated from your actual results. It covers your top growth areas, the dimensions where you're most aligned, and practices built for how you two specifically are wired.</p>
      <div class="btn-wrap"><a href="#" class="btn">Download workbook</a></div>
      <div class="divider"></div>
      <div class="detail-row"><span>Order</span><strong>#ATT-20260401</strong></div>
      <div class="detail-row"><span>Format</span><strong>.docx – opens in Word, Pages, or Google Docs</strong></div>
      <p style="font-size:.78rem;color:#8C7A68;margin-top:16px;">The download link is active for 30 days. Reply to this email if you have trouble accessing your file.</p>
    `)
  },
  beta_survey: {
    subject: "A quick question about your Attune experience",
    preview: "To: maya@example.com",
    html: wrap(`
      <span class="badge badge-orange">Beta feedback</span>
      <h1 style="margin-top:14px;">How did it land?</h1>
      <p>Hi Maya,</p>
      <p>You and Alex completed Attune – your couple type is <strong>The Counterpart</strong>. We'd love to know what was useful and what wasn't.</p>
      <p>It's four questions and takes under two minutes.</p>
      <div class="btn-wrap"><a href="#" class="btn">Share feedback →</a></div>
      <div class="divider"></div>
      <p style="font-size:.78rem;color:#8C7A68;">This is a beta product. Your feedback shapes what we build next.</p>
    `)
  },
  welcome_account: {
    subject: "Welcome to Attune – let's get started",
    preview: "To: maya@example.com",
    html: wrap(`
      <h1>You're in. Let's get started.</h1>
      <p>Hi Maya,</p>
      <p>Your Attune account is set up. Both you and <strong>Alex</strong> each complete the exercises independently – your answers stay private until both of you are done.</p>
      <div class="btn-wrap"><a href="#" class="btn">Go to my dashboard →</a></div>
      <div class="divider"></div>
      <p style="font-size:0.82rem;font-weight:700;color:#0E0B07;margin-bottom:6px;">What happens next</p>
      <p style="font-size:0.8rem;">1. Complete Exercise 01: Communication (about 10 minutes).<br/>2. Complete Exercise 02: Expectations (about 15 minutes).<br/>3. Once both of you are done, your joint results unlock.</p>
    `)
  },
  partner_joined: {
    subject: "Alex just joined Attune",
    preview: "To: maya@example.com",
    html: wrap(`
      <span class="badge badge-green">Partner joined</span>
      <h1 style="margin-top:14px;">Alex just created their account.</h1>
      <p>Hi Maya,</p>
      <p>Alex has joined Attune. Once both of you have completed your exercises, your joint results will unlock. Your answers stay private until then.</p>
      <div class="btn-wrap"><a href="#" class="btn">Go to my dashboard →</a></div>
    `)
  },
  lmft_scheduled: {
    subject: "Book your LMFT session – Attune",
    preview: "To: maya@example.com",
    html: wrap(`
      <span class="badge badge-blue">LMFT session included</span>
      <h1 style="margin-top:14px;">Book your session with a licensed therapist.</h1>
      <p>Hi Maya,</p>
      <p>Your Attune package includes a 50-minute session with a licensed marriage and family therapist (LMFT). They'll review your joint results before you meet – so the session starts from your actual data, not from scratch.</p>
      <div class="btn-wrap"><a href="#" class="btn">Book your session →</a></div>
      <div class="divider"></div>
      <div class="detail-row"><span>Order</span><strong>#ATT-20260401-DEMO</strong></div>
      <div class="detail-row"><span>Format</span><strong>50-minute video session</strong></div>
    `)
  },
  checkin_6mo: {
    subject: "Six months with Attune – worth a look",
    preview: "To: maya@example.com",
    html: wrap(`
      <h1>Six months is a good time to check in.</h1>
      <p>Hi Maya,</p>
      <p>Six months ago, you and Alex took Attune together. Couples who retake it after 6–12 months often find their results have shifted – usually in ways that reflect real changes in how they're relating.</p>
      <p>A lot can move in half a year: how you handle stress, what you need, how you repair. Some things get easier. New friction appears. The assessment is most useful as a check-in, not a one-time snapshot.</p>
      <div class="btn-wrap"><a href="#" class="btn">Retake Attune →</a></div>
      <div class="divider"></div>
      <p style="font-size:.78rem;color:#8C7A68;">Your previous results are still accessible in your dashboard. Retaking creates a new session – you'll be able to compare the two.</p>
    `)
  },
  order_confirm: {
    subject: "Your Attune order – #ATT-20260401",
    preview: "To: maya@example.com",
    html: wrap(`
      <h1>You're all set.</h1>
      <p>Hi Maya,</p>
      <p>Your Attune order is confirmed. Here's what happens next.</p>
      <div class="divider"></div>
      <div class="detail-row"><span>Order</span><strong>#ATT-20260401</strong></div>
      <div class="detail-row"><span>Package</span><strong>Relationship Reflection</strong></div>
      <div class="detail-row"><span>Total</span><strong>$159.00</strong></div>
      <div class="divider"></div>
      <p>Open Attune and complete your exercises. When you're both done, your couple type, dimension breakdown, and personalized insights unlock together.</p>
      <div class="btn-wrap"><a href="#" class="btn">Start your exercises →</a></div>
    `)
  },
  checkin_1yr: {
    subject: "One year with Attune – your results are worth revisiting",
    preview: "To: maya@example.com",
    html: wrap(`
      <h1>A year is a meaningful unit of time.</h1>
      <p>Hi Maya,</p>
      <p>You and Alex took Attune a year ago. In that time, you've navigated seasons, decisions, and the ordinary accumulation of a shared life. The patterns that showed up in your results may look different now.</p>
      <div class="btn-wrap"><a href="#" class="btn">Retake Attune →</a></div>
    `)
  },
};

function show(key, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const t = templates[key];
  const frame = document.getElementById('preview');
  frame.srcdoc = t.html;
  document.getElementById('meta').innerHTML = `<strong>Subject:</strong> ${t.subject} &nbsp;·&nbsp; <strong>${t.preview}</strong>`;
}

// Init
show('partner_invite', document.querySelector('.tab.active'));
</script>
</body>
</html>
