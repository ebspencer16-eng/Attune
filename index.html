<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attune</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Attune">
  <meta name="theme-color" content="#0E0B07">
  <meta name="robots" content="noindex,nofollow">
  <style>
    html,body{overflow-x:hidden;max-width:100%;position:relative}
    /* iOS auto-zooms inputs smaller than 16px. Force 16px on mobile across the app
       to prevent jarring zoom when testers tap any field. */
    @media(max-width:780px){
      input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="file"]),
      textarea,
      select{
        font-size:16px!important;
      }
    }
  </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
